<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>وصلني كتامية — راكب</title>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<link rel="manifest" href="manifest.json"/>
<meta name="theme-color" content="#1a2340"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
:root{--navy:#1a2340;--gold:#c8973a;--gold2:#e8b85a;--green:#16a34a;--red:#dc2626;--white:#fff;--muted:#6b7280;--ff:'Cairo',sans-serif}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:var(--ff);overflow:hidden}

#map{position:fixed;inset:0;z-index:0}

/* ── TOPBAR ── */
.topbar{position:fixed;top:0;left:0;right:0;z-index:200;background:var(--navy);padding:10px 14px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 20px rgba(0,0,0,.4)}
.topbar-logo{font-size:16px;font-weight:900;color:#fff}
.topbar-logo b{color:var(--gold2)}
.topbar-right{display:flex;align-items:center;gap:6px}
.topbar-name{font-size:11px;color:rgba(255,255,255,.7);max-width:80px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.topbar-badge{background:rgba(200,151,58,.2);border:1px solid rgba(200,151,58,.35);border-radius:999px;padding:3px 9px;font-size:11px;font-weight:700;color:var(--gold2)}
.btn-logout{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);border-radius:8px;padding:5px 9px;color:rgba(255,255,255,.6);font-family:var(--ff);font-size:11px;cursor:pointer;transition:all .2s}
.btn-logout:hover{background:rgba(255,255,255,.18);color:#fff}

/* ── SEARCH BOX (Google Maps style) ── */
.search-box{
  position:fixed;top:62px;left:12px;right:12px;z-index:200;
  background:#fff;border-radius:14px;
  box-shadow:0 4px 24px rgba(0,0,0,.18);
  overflow:hidden;
}
.search-inner{display:flex;align-items:center;gap:0;padding:0 14px}
.search-icon{font-size:18px;flex-shrink:0;margin-left:10px}
.search-input{
  flex:1;border:none;outline:none;
  font-family:var(--ff);font-size:15px;font-weight:600;color:var(--navy);
  padding:14px 0;background:transparent;
}
.search-input::placeholder{color:#9ca3af;font-weight:400}
.search-clear{background:none;border:none;font-size:18px;color:#9ca3af;cursor:pointer;padding:4px;display:none}
.search-clear.show{display:block}

/* SUGGESTIONS */
.suggestions{
  border-top:1px solid #f3f4f6;
  max-height:200px;overflow-y:auto;
  display:none;
}
.suggestions.show{display:block}
.suggestion-item{
  display:flex;align-items:center;gap:12px;
  padding:12px 14px;cursor:pointer;transition:background .15s;
  border-bottom:1px solid #f9fafb;
}
.suggestion-item:hover{background:#f9fafb}
.sug-icon{font-size:16px;flex-shrink:0;width:32px;height:32px;background:#f3f4f6;border-radius:50%;display:flex;align-items:center;justify-content:center}
.sug-name{font-size:13px;font-weight:700;color:var(--navy)}
.sug-addr{font-size:11px;color:var(--muted);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:240px}
.sug-loading{padding:14px;text-align:center;color:var(--muted);font-size:13px}

/* ── PRICE CHIP (on map) ── */
.price-chip{
  position:fixed;top:135px;right:12px;z-index:190;
  background:var(--navy);color:#fff;
  border-radius:12px;padding:8px 14px;
  box-shadow:0 4px 16px rgba(0,0,0,.25);
  display:none;flex-direction:column;align-items:center;
}
.price-chip.show{display:flex}
.price-chip-val{font-size:20px;font-weight:900;color:var(--gold2)}
.price-chip-dist{font-size:11px;color:rgba(255,255,255,.6);margin-top:1px}

/* ── PANEL ── */
.panel{position:fixed;bottom:0;left:0;right:0;z-index:200;background:#fff;border-radius:22px 22px 0 0;padding:10px 18px 30px;box-shadow:0 -6px 30px rgba(0,0,0,.15)}
.panel-handle{width:36px;height:4px;background:#e5e7eb;border-radius:2px;margin:0 auto 12px}
.panel-state{display:none}
.panel-state.active{display:block;animation:fadeUp .3s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* IDLE */
.idle-title{font-size:16px;font-weight:900;color:var(--navy);margin-bottom:3px}
.idle-sub{font-size:12px;color:var(--muted);margin-bottom:12px}

.btn-request{width:100%;border:none;border-radius:14px;padding:15px;font-family:var(--ff);font-size:16px;font-weight:900;cursor:pointer;background:linear-gradient(135deg,var(--navy),#2d3f7a);color:#fff;box-shadow:0 6px 22px rgba(26,35,64,.3);transition:all .2s;display:flex;align-items:center;justify-content:center;gap:8px}
.btn-request:hover{transform:translateY(-2px)}
.btn-request:disabled{opacity:.45;cursor:not-allowed;transform:none}

/* WAITING */
.waiting-row{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.pulse-ring{width:50px;height:50px;position:relative;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.pulse-ring::before,.pulse-ring::after{content:'';position:absolute;inset:0;border:2px solid var(--gold);border-radius:50%;animation:pr 2s ease-out infinite}
.pulse-ring::after{animation-delay:-1s}
@keyframes pr{from{transform:scale(.6);opacity:1}to{transform:scale(2);opacity:0}}
.pulse-icon{font-size:24px;position:relative;z-index:1}
.waiting-title{font-size:15px;font-weight:800;color:var(--navy)}
.waiting-sub{font-size:11px;color:var(--muted);margin-top:2px}
.waiting-timer{font-size:22px;font-weight:900;color:var(--gold);margin-top:3px}

/* STATUS MSG */
.status-msg{border-radius:12px;padding:11px 13px;margin-bottom:11px;display:flex;align-items:center;gap:9px}
.status-msg.green{background:#f0fdf4;border:1px solid #86efac}
.status-msg.amber{background:#fffbeb;border:1px solid #fcd34d}
.status-msg.blue{background:#eff6ff;border:1px solid #93c5fd}
.status-msg-icon{font-size:20px;flex-shrink:0}
.status-msg-text{font-size:12px;font-weight:700;color:var(--navy);line-height:1.5}

/* CAPTAIN CARD */
.cap-card{background:linear-gradient(135deg,var(--navy),#2d3f7a);border-radius:14px;padding:13px 15px;display:flex;align-items:center;gap:11px;margin-bottom:11px}
.cap-avatar{width:44px;height:44px;background:var(--gold);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.cap-info{flex:1;min-width:0}
.cap-name{font-size:14px;font-weight:800;color:#fff}
.cap-plate{font-size:11px;color:rgba(255,255,255,.6);margin-top:1px}
.cap-stars{font-size:11px;color:var(--gold2);margin-top:1px}
/* CALL BUTTON */
.cap-call{
  display:flex;align-items:center;justify-content:center;
  width:42px;height:42px;border-radius:50%;
  background:var(--green);border:none;cursor:pointer;
  font-size:20px;flex-shrink:0;
  box-shadow:0 3px 12px rgba(22,163,74,.4);
  transition:all .2s;text-decoration:none;
}
.cap-call:hover{transform:scale(1.1);box-shadow:0 5px 18px rgba(22,163,74,.5)}
.cap-call:active{transform:scale(.95)}

/* PRICE PILL */
.price-pill{display:inline-flex;align-items:center;gap:4px;background:rgba(26,35,64,.06);border-radius:8px;padding:5px 10px;font-size:12px;font-weight:700;color:var(--navy);margin-bottom:9px}
.live-row{display:flex;align-items:center;gap:6px;margin-bottom:9px}
.live-dot{width:7px;height:7px;background:var(--green);border-radius:50%;animation:lp 1.5s infinite;flex-shrink:0}
@keyframes lp{0%,100%{opacity:1}50%{opacity:.3}}
.live-text{font-size:11px;color:var(--muted)}

/* ARRIVED */
.arrived-wrap{text-align:center;padding:6px 0}
.arrived-icon{font-size:48px;display:block;margin-bottom:8px;animation:bnc .6s ease infinite alternate}
@keyframes bnc{from{transform:translateY(0)}to{transform:translateY(-7px)}}
.arrived-title{font-size:19px;font-weight:900;color:var(--navy)}
.arrived-price{font-size:24px;font-weight:900;color:var(--gold);margin:4px 0}
.arrived-sub{font-size:12px;color:var(--muted);margin-bottom:12px}
.rating-row{display:flex;justify-content:center;gap:5px;margin-bottom:12px}
.star-btn{font-size:24px;cursor:pointer;transition:transform .15s;filter:grayscale(1);opacity:.3}
.star-btn.on{filter:none;opacity:1;transform:scale(1.2)}

/* BTNS */
.btn-cancel{width:100%;border:1.5px solid #e5e7eb;border-radius:12px;padding:11px;font-family:var(--ff);font-size:13px;font-weight:700;cursor:pointer;background:transparent;color:var(--red);transition:all .2s;margin-top:9px}
.btn-cancel:hover{border-color:var(--red);background:#fef2f2}
.btn-done{width:100%;border:none;border-radius:12px;padding:14px;font-family:var(--ff);font-size:15px;font-weight:800;cursor:pointer;background:linear-gradient(135deg,var(--green),#15803d);color:#fff;box-shadow:0 5px 18px rgba(22,163,74,.3);transition:all .2s}
.btn-done:hover{transform:translateY(-2px)}

/* LOCATE BTN */
.locate-btn{position:fixed;bottom:235px;left:12px;z-index:190;width:40px;height:40px;background:#fff;border:none;border-radius:10px;font-size:18px;cursor:pointer;box-shadow:0 3px 12px rgba(0,0,0,.2);display:flex;align-items:center;justify-content:center;transition:all .2s}
.locate-btn:hover{transform:scale(1.08)}

/* TOAST */
.toast{position:fixed;top:70px;left:50%;transform:translateX(-50%);background:var(--navy);color:#fff;padding:8px 18px;border-radius:999px;font-size:13px;font-weight:700;z-index:999;white-space:nowrap;box-shadow:0 4px 18px rgba(0,0,0,.3);display:none}
.toast.show{display:block;animation:toastIn .3s ease}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(-8px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
</style>
</head>
<body>
<div id="map"></div>
<div class="toast" id="toast"></div>

<!-- TOPBAR -->
<div class="topbar">
  <div class="topbar-logo">🏍️ وصلني <b>كتامية</b></div>
  <div class="topbar-right">
    <div class="topbar-name" id="topbar-name"></div>
    <div class="topbar-badge" id="rides-count">0 مشوار</div>
    <button class="btn-logout" onclick="logout()">خروج</button>
  </div>
</div>

<!-- GOOGLE-MAPS-STYLE SEARCH -->
<div class="search-box" id="search-box">
  <div class="search-inner">
    <span class="search-icon">🔍</span>
    <input class="search-input" id="search-input" type="text" placeholder="رايح فين؟ ابحث عن المكان…" autocomplete="off" oninput="onSearch()" onfocus="onSearchFocus()"/>
    <button class="search-clear" id="search-clear" onclick="clearSearch()">✕</button>
  </div>
  <div class="suggestions" id="suggestions"></div>
</div>

<!-- PRICE CHIP -->
<div class="price-chip" id="price-chip">
  <div class="price-chip-val" id="chip-price">—</div>
  <div class="price-chip-dist" id="chip-dist">—</div>
</div>

<button class="locate-btn" onclick="centerMap()">📍</button>

<!-- PANEL -->
<div class="panel">
  <div class="panel-handle"></div>

  <!-- IDLE -->
  <div class="panel-state active" id="state-idle">
    <div class="idle-title">مرحباً يا <span id="idle-name"></span>! 👋</div>
    <div class="idle-sub">ابحث عن وجهتك فوق واطلب توصيلة</div>
    <button class="btn-request" id="btn-request" onclick="requestRide()" disabled>
      🏍️ اطلب توصيلة دلوقتي
    </button>
  </div>

  <!-- WAITING -->
  <div class="panel-state" id="state-waiting">
    <div class="waiting-row">
      <div class="pulse-ring"><span class="pulse-icon">🔍</span></div>
      <div>
        <div class="waiting-title">بندور على كابتن</div>
        <div class="waiting-sub" id="waiting-dest">جاري البحث…</div>
        <div class="waiting-timer" id="wait-timer">00:00</div>
      </div>
    </div>
    <div class="status-msg amber">
      <span class="status-msg-icon">⏳</span>
      <span class="status-msg-text">أنت في طريقك لمشوارك — بنلاقيلك أقرب كابتن متاح</span>
    </div>
    <button class="btn-cancel" onclick="cancelRide()">إلغاء الطلب</button>
  </div>

  <!-- ACCEPTED -->
  <div class="panel-state" id="state-accepted">
    <div class="cap-card">
      <div class="cap-avatar">🏍️</div>
      <div class="cap-info">
        <div class="cap-name" id="cap-name-d">—</div>
        <div class="cap-plate" id="cap-plate-d">—</div>
        <div class="cap-stars" id="cap-stars-d">★★★★★</div>
      </div>
      <!-- CALL CAPTAIN -->
      <a class="cap-call" id="cap-call-btn" href="#" onclick="return false">📞</a>
    </div>
    <div class="price-pill" id="ride-price-pill">💰 —</div>
    <div class="live-row">
      <div class="live-dot"></div>
      <span class="live-text">بيتبع موقع الكابتن مباشرة</span>
    </div>
    <div class="status-msg green" id="accepted-msg">
      <span class="status-msg-icon">🏍️</span>
      <span class="status-msg-text" id="accepted-msg-text">الكابتن في الطريق إليك!</span>
    </div>
    <button class="btn-cancel" onclick="cancelRide()">إلغاء الرحلة</button>
  </div>

  <!-- ARRIVED -->
  <div class="panel-state" id="state-arrived">
    <div class="arrived-wrap">
      <span class="arrived-icon">🎉</span>
      <div class="arrived-title">وصلت بالسلامة!</div>
      <div class="arrived-price" id="final-price">—</div>
      <div class="arrived-sub">قيّم الكابتن</div>
      <div class="rating-row">
        <span class="star-btn" onclick="rate(1)">⭐</span>
        <span class="star-btn" onclick="rate(2)">⭐</span>
        <span class="star-btn" onclick="rate(3)">⭐</span>
        <span class="star-btn" onclick="rate(4)">⭐</span>
        <span class="star-btn" onclick="rate(5)">⭐</span>
      </div>
      <button class="btn-done" onclick="doneRide()">تمام، شكراً! ✓</button>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="security.js"></script>
<script>
'use strict';

/* ── SESSION CHECK ── */
const session = Security.checkSession();
if (!session || session.role !== 'passenger') window.location.href = 'index.html';
const { uid, uname='', uphone='' } = { uid: session.uid, uname: session.name, uphone: session.phone };

document.getElementById('topbar-name').textContent = Security.sanitize(uname);
document.getElementById('idle-name').textContent   = Security.sanitize((uname||'').split(' ')[0]);

/* ── FIREBASE ── */
firebase.initializeApp({
  apiKey:"AIzaSyCQqqiNQkm-NPGR5XVYkJaM8Li8nqnZYA8",
  authDomain:"al-warsha.firebaseapp.com",
  databaseURL:"https://al-warsha-default-rtdb.firebaseio.com",
  projectId:"al-warsha",
  storageBucket:"al-warsha.firebasestorage.app",
  messagingSenderId:"913946656614",
  appId:"1:913946656614:web:9dad073c3c5664c23a92a7"
});
const db = firebase.firestore();

/* ── MAP ── */
let myLat=30.0776, myLng=31.3243; // كتامية default
const map = L.map('map',{zoomControl:false,attributionControl:false}).setView([myLat,myLng],17);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19,
  attribution:'© OpenStreetMap'}).addTo(map);

// Zoom control bottom-left
L.control.zoom({position:'bottomleft'}).addTo(map);

function makeIcon(emoji,size=36){
  return L.divIcon({
    html:`<div style="font-size:${size}px;line-height:1;filter:drop-shadow(0 2px 6px rgba(0,0,0,.5));text-align:center">${emoji}</div>`,
    iconSize:[size,size],iconAnchor:[size/2,size/2],className:''
  });
}

let myMarker=null, destMarker=null, captainMarker=null, routeLine=null;

function setMyMarker(lat,lng){
  if(myMarker) myMarker.setLatLng([lat,lng]);
  else myMarker=L.marker([lat,lng],{icon:makeIcon('📍',38),zIndexOffset:1000}).addTo(map);
}

function centerMap(){ map.setView([myLat,myLng],17); }

/* ── GPS ── */
navigator.geolocation?.watchPosition(pos=>{
  myLat=pos.coords.latitude; myLng=pos.coords.longitude;
  setMyMarker(myLat,myLng);
  if(currentRideId) db.collection('rides').doc(currentRideId)
    .update({passengerLocation:{lat:myLat,lng:myLng}}).catch(()=>{});
},{enableHighAccuracy:true,maximumAge:3000},err=>console.warn('GPS:',err));

/* ── DISTANCE & PRICE ── */
function calcDist(a,b,c,d){
  const R=6371,dL=(c-a)*Math.PI/180,dG=(d-b)*Math.PI/180;
  const x=Math.sin(dL/2)**2+Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*Math.sin(dG/2)**2;
  return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));
}
const PRICE_PER_KM=4, MIN_PRICE=5;
function calcPrice(km){ return Math.max(MIN_PRICE,Math.ceil(km*PRICE_PER_KM)); }

/* ── SEARCH (Google Maps Style) ── */
let destLat=null,destLng=null,destName='',searchTimeout=null;

function onSearch(){
  const q=document.getElementById('search-input').value.trim();
  document.getElementById('search-clear').classList.toggle('show',q.length>0);
  clearDest();
  clearTimeout(searchTimeout);
  const sug=document.getElementById('suggestions');
  if(q.length<2){ sug.classList.remove('show'); sug.innerHTML=''; return; }
  sug.classList.add('show');
  sug.innerHTML='<div class="sug-loading">🔍 جاري البحث…</div>';
  searchTimeout=setTimeout(()=>doSearch(q),600);
}

function onSearchFocus(){
  const q=document.getElementById('search-input').value.trim();
  if(q.length>=2) document.getElementById('suggestions').classList.add('show');
}

async function doSearch(q){
  if(!Security.rateLimit('search',10)){ return; }
  const sug=document.getElementById('suggestions');
  try{
    // Primary: search with village name
    const url=`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q)}&format=json&limit=5&accept-language=ar&countrycodes=eg&viewbox=31.2,30.2,31.5,30.0&bounded=1`;
    const r=await fetch(url,{headers:{'Accept-Language':'ar'}});
    let data=await r.json();
    if(!data.length){
      const r2=await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q+' مصر')}&format=json&limit=5&accept-language=ar`);
      data=await r2.json();
    }
    if(!data.length){ sug.innerHTML='<div class="sug-loading">مفيش نتايج، جرب كلمة تانية</div>'; return; }
    sug.innerHTML=data.slice(0,5).map((p,i)=>`
      <div class="suggestion-item" onclick="selectPlace(${i})">
        <div class="sug-icon">${p.type==='restaurant'?'🍽️':p.type==='school'?'🏫':p.type==='mosque'?'🕌':p.class==='highway'?'🛣️':'📍'}</div>
        <div>
          <div class="sug-name">${Security.sanitize(p.display_name.split(',')[0])}</div>
          <div class="sug-addr">${Security.sanitize(p.display_name.split(',').slice(1,3).join(', '))}</div>
        </div>
      </div>
    `).join('');
    window._searchResults=data;
  }catch(e){
    sug.innerHTML='<div class="sug-loading">مشكلة في الاتصال</div>';
  }
}

function selectPlace(i){
  const p=window._searchResults[i];
  if(!p)return;
  destLat=parseFloat(p.lat);
  destLng=parseFloat(p.lon);
  destName=p.display_name.split(',')[0];
  document.getElementById('search-input').value=destName;
  document.getElementById('suggestions').classList.remove('show');

  // Dest marker
  if(destMarker)destMarker.remove();
  destMarker=L.marker([destLat,destLng],{icon:makeIcon('🎯',40),zIndexOffset:900})
    .bindPopup(`<b style="font-family:Cairo,sans-serif">${Security.sanitize(destName)}</b>`).addTo(map).openPopup();

  // Route line (dashed)
  if(routeLine)routeLine.remove();
  routeLine=L.polyline([[myLat,myLng],[destLat,destLng]],{
    color:'#1a2340',weight:3,dashArray:'10 7',opacity:.55
  }).addTo(map);

  // Fit map with padding for panel
  map.fitBounds([[myLat,myLng],[destLat,destLng]],{paddingTopLeft:[20,60],paddingBottomRight:[20,220]});

  // Price chip
  const km=calcDist(myLat,myLng,destLat,destLng);
  const price=calcPrice(km);
  document.getElementById('chip-price').textContent=`${price} جنيه`;
  document.getElementById('chip-dist').textContent=`${km.toFixed(1)} كم`;
  document.getElementById('price-chip').classList.add('show');

  // Enable request btn
  document.getElementById('btn-request').disabled=false;

  showToast(`تم اختيار: ${destName}`);
}

function clearSearch(){
  document.getElementById('search-input').value='';
  document.getElementById('search-clear').classList.remove('show');
  document.getElementById('suggestions').classList.remove('show');
  document.getElementById('suggestions').innerHTML='';
  clearDest();
}

function clearDest(){
  destLat=null; destLng=null; destName='';
  if(destMarker){destMarker.remove();destMarker=null}
  if(routeLine){routeLine.remove();routeLine=null}
  document.getElementById('price-chip').classList.remove('show');
  document.getElementById('btn-request').disabled=true;
}

// Close suggestions on map click
map.on('click',()=>document.getElementById('suggestions').classList.remove('show'));

/* ── STATE ── */
let currentRideId=null,waitInterval=null,rideListener=null,waitSecs=0,ridePrice=0;

function showState(id){
  document.querySelectorAll('.panel-state').forEach(s=>s.classList.remove('active'));
  document.getElementById(id)?.classList.add('active');
}

/* ── REQUEST RIDE ── */
async function requestRide(){
  if(!Security.rateLimit('request',3)){ showToast('حاول بعد شوية'); return; }
  if(!destName){ showToast('اختار وجهة الأول'); return; }

  const km=destLat?calcDist(myLat,myLng,destLat,destLng):0;
  ridePrice=calcPrice(km);

  showState('state-waiting');
  document.getElementById('waiting-dest').textContent=`رايح: ${Security.sanitize(destName)}`;
  startWaitTimer();

  const writeData={
    passengerId:uid, passengerName:Security.sanitize(uname),
    passengerPhone:uphone,
    passengerLocation:{lat:myLat,lng:myLng},
    destName:Security.sanitize(destName),
    destLocation:destLat?{lat:destLat,lng:destLng}:null,
    distKm:parseFloat(km.toFixed(2)), price:ridePrice,
    status:'pending',
    captainId:null,captainName:null,captainPlate:null,captainPhone:null,captainLocation:null,
    createdAt:firebase.firestore.FieldValue.serverTimestamp()
  };

  if(!Security.validateWrite(writeData)){ showToast('خطأ في البيانات'); showState('state-idle'); return; }

  try{
    const ref=await db.collection('rides').add(writeData);
    currentRideId=ref.id;
    setMyMarker(myLat,myLng);

    rideListener=db.collection('rides').doc(currentRideId).onSnapshot(snap=>{
      const d=snap.data(); if(!d)return;
      if(d.status==='accepted') onAccepted(d);
      if(d.status==='ongoing')  onOngoing(d);
      if(d.status==='done')     onDone(d);
      if(d.status==='cancelled'&&d.cancelledBy==='captain'){
        cleanup(); showState('state-idle');
        showToast('الكابتن ألغى الرحلة ❌');
      }
      if(d.captainLocation){
        const cl=d.captainLocation;
        if(captainMarker) captainMarker.setLatLng([cl.lat,cl.lng]);
        else captainMarker=L.marker([cl.lat,cl.lng],{icon:makeIcon('🏍️',44),zIndexOffset:800}).addTo(map)
          .bindPopup(`<b style="font-family:Cairo,sans-serif">${Security.sanitize(d.captainName||'الكابتن')}</b>`);
      }
    });
  }catch(e){
    console.error(e); showState('state-idle'); clearInterval(waitInterval);
    showToast('مشكلة في الاتصال');
  }
}

function onAccepted(d){
  clearInterval(waitInterval);
  document.getElementById('cap-name-d').textContent=Security.sanitize(d.captainName||'—');
  document.getElementById('cap-plate-d').textContent=Security.sanitize(d.captainPlate||'—');
  document.getElementById('cap-stars-d').textContent=
    d.captainAvgRating?`${'★'.repeat(Math.round(d.captainAvgRating))}${'☆'.repeat(5-Math.round(d.captainAvgRating))} (${d.captainAvgRating.toFixed(1)})`:'★★★★★';

  // CALL BUTTON — show masked number in label, real number in href
  if(d.captainPhone){
    const callBtn=document.getElementById('cap-call-btn');
    callBtn.href=`tel:${d.captainPhone}`;
    callBtn.onclick=null;
    callBtn.title=`اتصل بـ ${Security.maskPhone(d.captainPhone)}`;
  }

  document.getElementById('ride-price-pill').textContent=`💰 ${ridePrice} جنيه`;
  document.getElementById('accepted-msg-text').textContent='الكابتن في الطريق إليك — أنت في طريقك لمشوارك! 🏍️';
  document.getElementById('accepted-msg').className='status-msg green';
  showState('state-accepted');
}

function onOngoing(d){
  document.getElementById('accepted-msg-text').textContent='أنتوا دلوقتي في الطريق للوجهة 🎯 استنى الكابتن يوصلك!';
  document.getElementById('accepted-msg').className='status-msg blue';
}

function onDone(d){
  cleanup();
  document.getElementById('final-price').textContent=`${ridePrice} جنيه 💰`;
  showState('state-arrived');
  if(captainMarker){captainMarker.remove();captainMarker=null}
  clearDest();
  loadRidesCount();
}

async function cancelRide(){
  cleanup();
  if(currentRideId){
    await db.collection('rides').doc(currentRideId)
      .update({status:'cancelled',cancelledBy:'passenger'}).catch(()=>{});
    currentRideId=null;
  }
  if(captainMarker){captainMarker.remove();captainMarker=null}
  showState('state-idle');
}

function cleanup(){
  clearInterval(waitInterval);
  if(rideListener){rideListener();rideListener=null}
}

function startWaitTimer(){
  waitSecs=0; clearInterval(waitInterval);
  waitInterval=setInterval(()=>{
    waitSecs++;
    const m=String(Math.floor(waitSecs/60)).padStart(2,'0');
    const s=String(waitSecs%60).padStart(2,'0');
    document.getElementById('wait-timer').textContent=`${m}:${s}`;
  },1000);
}

/* ── RATING ── */
let myRating=0;
function rate(n){
  myRating=n;
  document.querySelectorAll('.star-btn').forEach((s,i)=>s.classList.toggle('on',i<n));
}

async function doneRide(){
  if(currentRideId&&myRating){
    try{
      const rideSnap=await db.collection('rides').doc(currentRideId).get();
      const rd=rideSnap.data();
      await db.collection('rides').doc(currentRideId).update({passengerRating:myRating});
      if(rd?.captainId){
        const cs=await db.collection('users').doc(rd.captainId).get();
        const cd=cs.data()||{};
        const tot=(cd.totalRatings||0)+1, sum=(cd.sumRatings||0)+myRating;
        await db.collection('users').doc(rd.captainId).update({
          totalRatings:tot, sumRatings:sum, avgRating:parseFloat((sum/tot).toFixed(1))
        });
      }
    }catch(e){console.error(e)}
  }
  currentRideId=null; myRating=0;
  clearSearch(); showState('state-idle'); centerMap();
}

/* ── RIDES COUNT ── */
async function loadRidesCount(){
  try{
    const today=new Date(); today.setHours(0,0,0,0);
    const snap=await db.collection('rides').where('passengerId','==',uid).where('status','==','done').get();
    let c=0;
    snap.forEach(doc=>{ const d=doc.data(); if(d.createdAt&&d.createdAt.toDate()>=today) c++; });
    document.getElementById('rides-count').textContent=`${c} مشوار`;
  }catch(e){}
}

/* ── TOAST ── */
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2800);
}

/* ── LOGOUT ── */
function logout(){ localStorage.clear(); window.location.href='index.html'; }

/* ── ON LOAD ── */
window.addEventListener('DOMContentLoaded',async()=>{
  loadRidesCount();
  // GPS first fix
  navigator.geolocation?.getCurrentPosition(pos=>{
    myLat=pos.coords.latitude; myLng=pos.coords.longitude;
    setMyMarker(myLat,myLng); map.setView([myLat,myLng],17);
  },{enableHighAccuracy:true});

  // Restore active ride
  try{
    const snap=await db.collection('rides')
      .where('passengerId','==',uid)
      .where('status','in',['pending','accepted','ongoing'])
      .limit(1).get();
    if(!snap.empty){
      currentRideId=snap.docs[0].id;
      const d=snap.docs[0].data();
      ridePrice=d.price||0;
      if(d.destName){
        document.getElementById('search-input').value=d.destName;
        document.getElementById('btn-request').disabled=false;
        destName=d.destName;
      }
      if(d.status==='pending'){showState('state-waiting');startWaitTimer();}
      if(d.status==='accepted') onAccepted(d);
      if(d.status==='ongoing')  onOngoing(d);
      rideListener=db.collection('rides').doc(currentRideId).onSnapshot(snap=>{
        const dd=snap.data(); if(!dd)return;
        if(dd.status==='accepted') onAccepted(dd);
        if(dd.status==='ongoing')  onOngoing(dd);
        if(dd.status==='done')     onDone(dd);
        if(dd.captainLocation){
          const cl=dd.captainLocation;
          if(captainMarker) captainMarker.setLatLng([cl.lat,cl.lng]);
          else captainMarker=L.marker([cl.lat,cl.lng],{icon:makeIcon('🏍️',44)}).addTo(map);
        }
      });
    }
  }catch(e){console.error(e)}
});
</script>
