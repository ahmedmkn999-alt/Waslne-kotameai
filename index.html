<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>وصلني كتامية</title>
<link rel="manifest" href="manifest.json"/>
<meta name="theme-color" content="#1a2340"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="وصلني كتامية"/>
<link rel="apple-touch-icon" href="icon-192.png"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet"/>
<style>
:root {
  --navy: #1a2340;
  --gold: #c8973a;
  --gold2: #e8b85a;
  --white: #ffffff;
  --muted: #6b7280;
  --danger: #dc2626;
  --ff: 'Cairo', sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: var(--ff);
  background: var(--navy);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.card {
  background: var(--white);
  border-radius: 28px;
  width: 100%;
  max-width: 420px;
  overflow: hidden;
  box-shadow: 0 40px 100px rgba(0,0,0,.5);
}
.card-header {
  background: linear-gradient(160deg, var(--navy) 0%, #253260 100%);
  padding: 36px 28px 28px;
  text-align: center;
}
.logo-circle {
  width: 100px;
  height: 100px;
  border-radius: 50%;
  border: 3px solid var(--gold);
  margin: 0 auto 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--navy);
  box-shadow: 0 0 0 6px rgba(200,151,58,.15);
}
.logo-circle span { font-size: 46px; }
.app-name {
  font-size: 26px;
  font-weight: 900;
  color: var(--white);
}
.app-name span { color: var(--gold2); }
.app-tagline {
  font-size: 13px;
  color: rgba(255,255,255,.6);
  margin-top: 4px;
}
.card-body { padding: 32px 28px 28px; }
.step { display: none; }
.step.active { display: block; animation: fadeIn .3s ease; }
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}
.step-title {
  font-size: 18px;
  font-weight: 800;
  color: var(--navy);
  margin-bottom: 6px;
}
.step-sub {
  font-size: 13px;
  color: var(--muted);
  margin-bottom: 22px;
}
.roles {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-bottom: 22px;
}
.role-card {
  border: 2px solid #e5e7eb;
  border-radius: 16px;
  padding: 20px 12px;
  text-align: center;
  cursor: pointer;
  transition: all .2s;
  background: #fafafa;
  position: relative;
}
.role-card.selected {
  border-color: var(--navy);
  background: var(--navy);
}
.role-card.selected .rlabel { color: var(--white); }
.role-card.selected .rsub { color: rgba(255,255,255,.6); }
.role-icon { font-size: 36px; margin-bottom: 10px; display: block; }
.rlabel { font-size: 15px; font-weight: 800; color: var(--navy); }
.rsub { font-size: 11px; color: var(--muted); margin-top: 3px; }
.check {
  position: absolute;
  top: 10px;
  left: 10px;
  width: 20px;
  height: 20px;
  background: var(--gold);
  border-radius: 50%;
  display: none;
  align-items: center;
  justify-content: center;
  color: var(--navy);
  font-size: 12px;
  font-weight: bold;
}
.role-card.selected .check { display: flex; }
.field { margin-bottom: 16px; }
.field label {
  display: block;
  font-size: 12px;
  font-weight: 700;
  color: var(--muted);
  margin-bottom: 7px;
}
input {
  width: 100%;
  background: #f9fafb;
  border: 1.5px solid #e5e7eb;
  border-radius: 12px;
  padding: 13px 16px;
  font-family: var(--ff);
  font-size: 15px;
  outline: none;
}
input:focus {
  border-color: var(--navy);
  background: var(--white);
}
.btn {
  width: 100%;
  border: none;
  border-radius: 14px;
  padding: 15px;
  font-family: var(--ff);
  font-size: 16px;
  font-weight: 800;
  cursor: pointer;
  margin-bottom: 10px;
}
.btn-primary {
  background: linear-gradient(135deg, var(--navy), #253260);
  color: var(--white);
}
.btn-gold {
  background: linear-gradient(135deg, var(--gold), var(--gold2));
  color: var(--navy);
}
.btn-ghost {
  background: transparent;
  border: 1.5px solid #e5e7eb;
  color: var(--muted);
}
.err {
  background: #fef2f2;
  border: 1px solid #fecaca;
  border-radius: 10px;
  padding: 10px;
  font-size: 13px;
  color: var(--danger);
  margin-bottom: 14px;
  display: none;
}
.err.show { display: block; }
.progress {
  height: 3px;
  background: #f3f4f6;
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--navy), var(--gold));
  transition: width .4s ease;
}
.dots {
  display: flex;
  justify-content: center;
  gap: 6px;
  margin-bottom: 24px;
}
.dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: #e5e7eb;
  transition: all .3s;
}
.dot.on { background: var(--navy); width: 18px; border-radius: 3px; }
.grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.captain-scroll { max-height: 55vh; overflow-y: auto; }
.phone-row { display: flex; gap: 8px; }
.prefix {
  background: #f9fafb;
  border: 1.5px solid #e5e7eb;
  border-radius: 12px;
  padding: 13px 12px;
  font-size: 13px;
  font-weight: 700;
  color: var(--navy);
}
</style>
</head>
<body>

<div class="card">
  <div class="progress">
    <div class="progress-fill" id="progress" style="width:33%"></div>
  </div>
  <div class="card-header">
    <div class="logo-circle"><span>🏍️</span></div>
    <div class="app-name">وصلني <span>كتامية</span></div>
    <div class="app-tagline">توصيل موتوسيكل — سريع وأمين</div>
  </div>
  <div class="card-body">
    <div class="dots">
      <div class="dot on" id="d1"></div>
      <div class="dot" id="d2"></div>
      <div class="dot" id="d3"></div>
    </div>

    <div class="step active" id="step-role">
      <div class="step-title">أنت مين؟ 👋</div>
      <div class="step-sub">اختار دورك عشان نوريلك الشاشة المناسبة</div>
      <div class="roles">
        <div class="role-card" id="card-pas" onclick="selectRole('passenger')">
          <div class="check">✓</div>
          <span class="role-icon">🧑</span>
          <div class="rlabel">راكب</div>
          <div class="rsub">عايز توصيلة</div>
        </div>
        <div class="role-card" id="card-cap" onclick="selectRole('captain')">
          <div class="check">✓</div>
          <span class="role-icon">🏍️</span>
          <div class="rlabel">كابتن</div>
          <div class="rsub">بوصّل الناس</div>
        </div>
      </div>
      <div id="err-role" class="err">اختار راكب أو كابتن الأول</div>
      <button class="btn btn-primary" onclick="afterRole()">التالي ←</button>
    </div>

    <div class="step" id="step-pas">
      <div class="step-title">بيانات الراكب</div>
      <div class="step-sub">اسمك ورقمك</div>
      <div class="field"><label>الاسم</label><input type="text" id="pas-name" placeholder="مثال: محمد أحمد"/></div>
      <div class="field">
        <label>رقم التليفون</label>
        <div class="phone-row"><div class="prefix">🇪🇬 +20</div><input type="tel" id="pas-phone" placeholder="01XXXXXXXXX" maxlength="11"/></div>
      </div>
      <div id="err-pas" class="err"></div>
      <button class="btn btn-gold" onclick="submitPas()">دخول ←</button>
      <button class="btn btn-ghost" onclick="goTo('step-role',1)">← رجوع</button>
    </div>

    <div class="step" id="step-cap">
      <div class="step-title">بيانات الكابتن</div>
      <div class="step-sub">بيانات حقيقية للتحقق</div>
      <div class="captain-scroll">
        <div class="field"><label>الاسم الكامل</label><input type="text" id="cap-name"/></div>
        <div class="grid2">
          <div class="field"><label>رقم اللوحة</label><input type="text" id="cap-plate"/></div>
          <div class="field"><label>رقم الرخصة</label><input type="text" id="cap-license"/></div>
        </div>
        <div class="field"><label>الرقم القومي</label><input type="tel" id="cap-nid" maxlength="14"/></div>
        <div class="field">
          <label>رقم التليفون</label>
          <div class="phone-row"><div class="prefix">🇪🇬 +20</div><input type="tel" id="cap-phone" maxlength="11"/></div>
        </div>
        <div class="field">
          <label>رقم بديل (اختياري)</label>
          <div class="phone-row"><div class="prefix">🇪🇬 +20</div><input type="tel" id="cap-phone2" maxlength="11"/></div>
        </div>
      </div>
      <div id="err-cap" class="err"></div>
      <button class="btn btn-primary" onclick="submitCap()">تسجيل الدخول ←</button>
      <button class="btn btn-ghost" onclick="goTo('step-role',1)">← رجوع</button>
    </div>

    <div class="step" id="step-loading">
      <div style="text-align:center;padding:20px 0">
        <span style="font-size:48px;display:block;margin-bottom:16px;">🏍️</span>
        <strong>جاري تسجيل دخولك</strong>
        <p>ثانية واحدة بس…</p>
      </div>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="index.js"></script>
</body>
</html>
