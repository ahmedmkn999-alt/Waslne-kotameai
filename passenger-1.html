<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>وصلني كتامية — راكب</title>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<link rel="manifest" href="manifest.json"/>
<meta name="theme-color" content="#1a2340"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
:root {
  --navy:  #1a2340;
  --gold:  #c8973a;
  --gold2: #e8b85a;
  --green: #16a34a;
  --red:   #dc2626;
  --white: #ffffff;
  --muted: #6b7280;
  --ff:    'Cairo', sans-serif;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; font-family: var(--ff); overflow: hidden; }

/* ── MAP ── */
#map {
  position: fixed; inset: 0; z-index: 0;
}

/* ── TOP BAR ── */
.topbar {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  background: var(--navy);
  padding: 12px 16px;
  display: flex; align-items: center; justify-content: space-between;
  box-shadow: 0 2px 20px rgba(0,0,0,.3);
}
.topbar-logo { display: flex; align-items: center; gap: 10px; }
.topbar-logo span { font-size: 20px; font-weight: 900; color: var(--white); }
.topbar-logo span b { color: var(--gold2); }
.topbar-name { font-size: 13px; color: rgba(255,255,255,.7); }
.btn-logout {
  background: rgba(255,255,255,.1);
  border: 1px solid rgba(255,255,255,.15);
  border-radius: 8px; padding: 6px 12px;
  color: rgba(255,255,255,.7); font-family: var(--ff);
  font-size: 12px; cursor: pointer;
  transition: all .2s;
}
.btn-logout:hover { background: rgba(255,255,255,.2); color: var(--white); }

/* ── BOTTOM PANEL ── */
.panel {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
  background: var(--white);
  border-radius: 24px 24px 0 0;
  padding: 12px 20px 30px;
  box-shadow: 0 -8px 40px rgba(0,0,0,.2);
  transition: transform .4s cubic-bezier(.34,1.2,.64,1);
}
.panel-handle {
  width: 40px; height: 4px;
  background: #e5e7eb; border-radius: 2px;
  margin: 0 auto 16px;
}

/* ── States ── */
.panel-state { display: none; }
.panel-state.active { display: block; animation: slideUp .3s ease; }
@keyframes slideUp {
  from { opacity:0; transform: translateY(12px); }
  to   { opacity:1; transform: translateY(0); }
}

/* ── Idle state ── */
.idle-title { font-size: 18px; font-weight: 900; color: var(--navy); margin-bottom: 4px; }
.idle-sub   { font-size: 13px; color: var(--muted); margin-bottom: 18px; }

.btn-request {
  width: 100%; border: none; border-radius: 16px;
  padding: 17px; font-family: var(--ff);
  font-size: 17px; font-weight: 900; cursor: pointer;
  background: linear-gradient(135deg, var(--navy), #253260);
  color: var(--white);
  box-shadow: 0 8px 28px rgba(26,35,64,.35);
  transition: all .2s;
  display: flex; align-items: center; justify-content: center; gap: 10px;
}
.btn-request:hover { transform: translateY(-2px); box-shadow: 0 12px 36px rgba(26,35,64,.45); }
.btn-request:active { transform: translateY(0); }

/* ── Waiting state ── */
.waiting-anim {
  display: flex; align-items: center; justify-content: center;
  gap: 16px; margin-bottom: 18px;
}
.pulse-ring {
  width: 60px; height: 60px; position: relative;
  display: flex; align-items: center; justify-content: center;
}
.pulse-ring::before, .pulse-ring::after {
  content: ''; position: absolute; inset: 0;
  border: 2px solid var(--gold);
  border-radius: 50%;
  animation: pulseRing 2s ease-out infinite;
}
.pulse-ring::after { animation-delay: -1s; }
@keyframes pulseRing {
  from { transform: scale(.6); opacity: 1; }
  to   { transform: scale(1.8); opacity: 0; }
}
.pulse-icon { font-size: 28px; position: relative; z-index: 1; }

.waiting-title { font-size: 17px; font-weight: 800; color: var(--navy); }
.waiting-sub   { font-size: 13px; color: var(--muted); margin-top: 4px; }
.waiting-timer { font-size: 28px; font-weight: 900; color: var(--gold); margin-top: 8px; }

.btn-cancel {
  width: 100%; border: 1.5px solid #e5e7eb; border-radius: 14px;
  padding: 13px; font-family: var(--ff);
  font-size: 14px; font-weight: 700; cursor: pointer;
  background: transparent; color: var(--red);
  transition: all .2s; margin-top: 12px;
}
.btn-cancel:hover { border-color: var(--red); background: #fef2f2; }

/* ── Captain found ── */
.captain-card {
  background: linear-gradient(135deg, var(--navy), #253260);
  border-radius: 16px; padding: 16px 18px;
  display: flex; align-items: center; gap: 14px;
  margin-bottom: 16px;
}
.captain-avatar {
  width: 52px; height: 52px;
  background: var(--gold);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 24px; flex-shrink: 0;
  box-shadow: 0 4px 12px rgba(0,0,0,.3);
}
.captain-info { flex: 1; }
.captain-name { font-size: 16px; font-weight: 800; color: var(--white); }
.captain-plate { font-size: 12px; color: rgba(255,255,255,.6); margin-top: 2px; }
.eta-badge {
  background: var(--gold);
  color: var(--navy);
  border-radius: 10px; padding: 6px 12px;
  font-size: 13px; font-weight: 800; text-align: center;
}
.eta-label { font-size: 10px; font-weight: 600; display: block; }

.tracking-label {
  font-size: 13px; color: var(--muted); margin-bottom: 12px;
  display: flex; align-items: center; gap: 8px;
}
.live-dot {
  width: 8px; height: 8px; background: var(--green);
  border-radius: 50%;
  animation: livePulse 1.5s ease-in-out infinite;
  flex-shrink: 0;
}
@keyframes livePulse {
  0%,100% { opacity: 1; } 50% { opacity: .3; }
}

/* ── Arrived ── */
.arrived-wrap { text-align: center; padding: 10px 0; }
.arrived-icon { font-size: 56px; margin-bottom: 12px; animation: bounce .6s ease infinite alternate; }
@keyframes bounce {
  from { transform: translateY(0); }
  to   { transform: translateY(-8px); }
}
.arrived-title { font-size: 22px; font-weight: 900; color: var(--navy); }
.arrived-sub   { font-size: 14px; color: var(--muted); margin: 6px 0 18px; }

.rating-row { display: flex; justify-content: center; gap: 8px; margin-bottom: 18px; }
.star-btn {
  font-size: 28px; cursor: pointer; transition: transform .15s;
  filter: grayscale(1); opacity: .4;
}
.star-btn.on { filter: none; opacity: 1; transform: scale(1.2); }

.btn-done {
  width: 100%; border: none; border-radius: 14px; padding: 15px;
  font-family: var(--ff); font-size: 16px; font-weight: 800; cursor: pointer;
  background: linear-gradient(135deg, var(--green), #15803d);
  color: var(--white);
  box-shadow: 0 6px 24px rgba(22,163,74,.3);
  transition: all .2s;
}
.btn-done:hover { transform: translateY(-2px); }

/* ── Location pin (my position) ── */
.my-pin { background: var(--navy); border: 3px solid var(--white); }

/* ── Locate btn ── */
.locate-btn {
  position: fixed; bottom: 220px; left: 16px; z-index: 200;
  width: 46px; height: 46px;
  background: var(--white); border: none; border-radius: 12px;
  font-size: 20px; cursor: pointer;
  box-shadow: 0 4px 16px rgba(0,0,0,.2);
  display: flex; align-items: center; justify-content: center;
  transition: all .2s;
}
.locate-btn:hover { transform: scale(1.08); box-shadow: 0 6px 20px rgba(0,0,0,.3); }
</style>
</head>
<body>

<div id="map"></div>

<!-- Top bar -->
<div class="topbar">
  <div class="topbar-logo">
    <span>🏍️ وصلني <b>كتامية</b></span>
  </div>
  <div style="display:flex;align-items:center;gap:10px">
    <div class="topbar-name" id="topbar-name"></div>
    <button class="btn-logout" onclick="logout()">خروج</button>
  </div>
</div>

<!-- Locate btn -->
<button class="locate-btn" onclick="centerMap()" title="موقعي">📍</button>

<!-- Bottom panel -->
<div class="panel" id="panel">
  <div class="panel-handle"></div>

  <!-- STATE: Idle -->
  <div class="panel-state active" id="state-idle">
    <div class="idle-title">مرحباً بيك! 👋</div>
    <div class="idle-sub">اضغط الزرار وهنلاقيلك كابتن قريب منك</div>
    <button class="btn-request" onclick="requestRide()">
      🏍️ اطلب توصيلة دلوقتي
    </button>
  </div>

  <!-- STATE: Waiting -->
  <div class="panel-state" id="state-waiting">
    <div class="waiting-anim">
      <div class="pulse-ring">
        <span class="pulse-icon">🔍</span>
      </div>
      <div>
        <div class="waiting-title">بندور على كابتن</div>
        <div class="waiting-sub">بيدور على أقرب كابتن متاح</div>
        <div class="waiting-timer" id="wait-timer">00:00</div>
      </div>
    </div>
    <button class="btn-cancel" onclick="cancelRide()">إلغاء الطلب</button>
  </div>

  <!-- STATE: Captain found / On the way -->
  <div class="panel-state" id="state-accepted">
    <div class="captain-card">
      <div class="captain-avatar">🏍️</div>
      <div class="captain-info">
        <div class="captain-name" id="cap-name-display">—</div>
        <div class="captain-plate" id="cap-plate-display">—</div>
      </div>
      <div class="eta-badge">
        <span class="eta-label">وصول</span>
        <span id="eta-val">3</span> د
      </div>
    </div>
    <div class="tracking-label">
      <div class="live-dot"></div>
      بيتبع موقع الكابتن مباشرة
    </div>
    <button class="btn-cancel" onclick="cancelRide()">إلغاء الرحلة</button>
  </div>

  <!-- STATE: Arrived -->
  <div class="panel-state" id="state-arrived">
    <div class="arrived-wrap">
      <div class="arrived-icon">🎉</div>
      <div class="arrived-title">وصلت بالسلامة!</div>
      <div class="arrived-sub">قيّم الكابتن</div>
      <div class="rating-row">
        <span class="star-btn" onclick="rate(1)">⭐</span>
        <span class="star-btn" onclick="rate(2)">⭐</span>
        <span class="star-btn" onclick="rate(3)">⭐</span>
        <span class="star-btn" onclick="rate(4)">⭐</span>
        <span class="star-btn" onclick="rate(5)">⭐</span>
      </div>
      <button class="btn-done" onclick="doneRide()">تمام، شكراً! ✓</button>
    </div>
  </div>

</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>
/* ── Auth guard ── */
const uid   = localStorage.getItem('wasselni_uid');
const uname = localStorage.getItem('wasselni_name');
const uphone= localStorage.getItem('wasselni_phone');
if (!uid || localStorage.getItem('wasselni_role') !== 'passenger')
  window.location.href = 'index.html';

document.getElementById('topbar-name').textContent = uname || '';

/* ── Firebase ── */
const firebaseConfig = {
  apiKey: "AIzaSyCQqqiNQkm-NPGR5XVYkJaM8Li8nqnZYA8",
  authDomain: "al-warsha.firebaseapp.com",
  databaseURL: "https://al-warsha-default-rtdb.firebaseio.com",
  projectId: "al-warsha",
  storageBucket: "al-warsha.firebasestorage.app",
  messagingSenderId: "913946656614",
  appId: "1:913946656614:web:4df914457d79b75dee2bf5"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

/* ── Map setup ── */
// Default: Katamia village approximate center
let myLat = 30.0, myLng = 31.4;
const map = L.map('map', { zoomControl: false, attributionControl: false }).setView([myLat, myLng], 16);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 19
}).addTo(map);

/* Custom markers */
function makeIcon(emoji, size=36) {
  return L.divIcon({
    html: `<div style="font-size:${size}px;line-height:1;filter:drop-shadow(0 2px 4px rgba(0,0,0,.4))">${emoji}</div>`,
    iconSize: [size, size], iconAnchor: [size/2, size/2],
    className: ''
  });
}

let myMarker = null, captainMarker = null;

function setMyMarker(lat, lng) {
  if (myMarker) myMarker.setLatLng([lat, lng]);
  else myMarker = L.marker([lat, lng], { icon: makeIcon('📍') }).addTo(map);
}

function centerMap() {
  map.setView([myLat, myLng], 16);
}

/* ── GPS ── */
function startGPS() {
  if (!navigator.geolocation) return;
  navigator.geolocation.watchPosition(pos => {
    myLat = pos.coords.latitude;
    myLng = pos.coords.longitude;
    setMyMarker(myLat, myLng);
    // Update location in Firestore if there's an active ride
    if (currentRideId) {
      db.collection('rides').doc(currentRideId).update({
        passengerLocation: { lat: myLat, lng: myLng }
      });
    }
  }, null, { enableHighAccuracy: true, maximumAge: 5000 });
}
startGPS();

/* ── State management ── */
let currentRideId  = null;
let waitInterval   = null;
let rideListener   = null;
let waitSecs       = 0;

function showState(id) {
  document.querySelectorAll('.panel-state').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

/* ── Request ride ── */
async function requestRide() {
  showState('state-waiting');
  startWaitTimer();

  try {
    const ref = await db.collection('rides').add({
      passengerId:      uid,
      passengerName:    uname,
      passengerPhone:   uphone,
      passengerLocation: { lat: myLat, lng: myLng },
      status:           'pending',
      captainId:        null,
      captainName:      null,
      captainPlate:     null,
      captainLocation:  null,
      createdAt:        firebase.firestore.FieldValue.serverTimestamp()
    });
    currentRideId = ref.id;

    // Add pin on map
    setMyMarker(myLat, myLng);
    map.setView([myLat, myLng], 16);

    // Listen for captain
    rideListener = db.collection('rides').doc(currentRideId)
      .onSnapshot(snap => {
        const data = snap.data();
        if (!data) return;

        if (data.status === 'accepted') onCaptainAccepted(data);
        if (data.status === 'ongoing')  onRideOngoing(data);
        if (data.status === 'done')     onRideDone(data);

        // Track captain location
        if (data.captainLocation) {
          const cl = data.captainLocation;
          if (captainMarker) captainMarker.setLatLng([cl.lat, cl.lng]);
          else captainMarker = L.marker([cl.lat, cl.lng], { icon: makeIcon('🏍️', 40) })
            .bindPopup(`<b>${data.captainName || 'الكابتن'}</b>`).addTo(map);
        }
      });

  } catch(e) {
    console.error(e);
    showState('state-idle');
    clearInterval(waitInterval);
  }
}

function onCaptainAccepted(data) {
  clearInterval(waitInterval);
  document.getElementById('cap-name-display').textContent  = data.captainName  || '—';
  document.getElementById('cap-plate-display').textContent = data.captainPlate || '—';
  showState('state-accepted');
}

function onRideOngoing(data) {
  showState('state-accepted');
}

function onRideDone(data) {
  cleanup();
  showState('state-arrived');
  if (captainMarker) { captainMarker.remove(); captainMarker = null; }
}

async function cancelRide() {
  cleanup();
  if (currentRideId) {
    await db.collection('rides').doc(currentRideId).update({ status: 'cancelled' });
    currentRideId = null;
  }
  if (captainMarker) { captainMarker.remove(); captainMarker = null; }
  showState('state-idle');
}

function cleanup() {
  clearInterval(waitInterval);
  if (rideListener) { rideListener(); rideListener = null; }
}

/* ── Wait timer ── */
function startWaitTimer() {
  waitSecs = 0;
  clearInterval(waitInterval);
  waitInterval = setInterval(() => {
    waitSecs++;
    const m = String(Math.floor(waitSecs/60)).padStart(2,'0');
    const s = String(waitSecs%60).padStart(2,'0');
    document.getElementById('wait-timer').textContent = `${m}:${s}`;
  }, 1000);
}

/* ── Rating ── */
let myRating = 0;
function rate(n) {
  myRating = n;
  document.querySelectorAll('.star-btn').forEach((s,i) => s.classList.toggle('on', i < n));
}

async function doneRide() {
  if (currentRideId && myRating) {
    await db.collection('rides').doc(currentRideId).update({ passengerRating: myRating });
  }
  currentRideId = null;
  showState('state-idle');
}

/* ── Logout ── */
function logout() {
  localStorage.clear();
  window.location.href = 'index.html';
}

/* ── Check existing ride on load ── */
window.addEventListener('DOMContentLoaded', async () => {
  const snap = await db.collection('rides')
    .where('passengerId', '==', uid)
    .where('status', 'in', ['pending','accepted','ongoing'])
    .orderBy('createdAt','desc').limit(1).get();

  if (!snap.empty) {
    currentRideId = snap.docs[0].id;
    const data = snap.docs[0].data();
    if (data.status === 'pending')   { showState('state-waiting'); startWaitTimer(); }
    if (data.status === 'accepted')  onCaptainAccepted(data);
    if (data.status === 'ongoing')   onRideOngoing(data);

    rideListener = db.collection('rides').doc(currentRideId)
      .onSnapshot(snap => {
        const d = snap.data();
        if (!d) return;
        if (d.status === 'accepted') onCaptainAccepted(d);
        if (d.status === 'ongoing')  onRideOngoing(d);
        if (d.status === 'done')     onRideDone(d);
        if (d.captainLocation) {
          const cl = d.captainLocation;
          if (captainMarker) captainMarker.setLatLng([cl.lat, cl.lng]);
          else captainMarker = L.marker([cl.lat, cl.lng], { icon: makeIcon('🏍️',40) }).addTo(map);
        }
      });
  }
});
</script>
</body>
</html>
