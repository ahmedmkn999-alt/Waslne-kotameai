<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>وصلني كتامية — كابتن</title>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<link rel="manifest" href="manifest.json"/>
<meta name="theme-color" content="#1a2340"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<style>
:root {
  --navy: #1a2340;
  --gold: #c8973a;
  --gold2: #e8b85a;
  --green: #16a34a;
  --red: #dc2626;
  --white: #ffffff;
  --muted: #6b7280;
  --ff: 'Cairo', sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; font-family: var(--ff); overflow: hidden; }
#map { position: fixed; inset: 0; z-index: 0; }
.topbar {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  background: var(--navy);
  padding: 12px 16px;
  display: flex; align-items: center; justify-content: space-between;
  box-shadow: 0 2px 20px rgba(0,0,0,.3);
}
.topbar-left { display: flex; align-items: center; gap: 10px; }
.topbar-left span { font-size: 18px; font-weight: 900; color: var(--white); }
.topbar-left span b { color: var(--gold2); }
.online-toggle {
  display: flex; align-items: center; gap: 8px;
  background: rgba(255,255,255,.08);
  border: 1px solid rgba(255,255,255,.12);
  border-radius: 999px; padding: 6px 14px;
  cursor: pointer;
}
.online-toggle.on { background: rgba(22,163,74,.2); border-color: rgba(22,163,74,.4); }
.toggle-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: #6b7280;
}
.online-toggle.on .toggle-dot { background: #4ade80; animation: pulse 1.5s infinite; }
@keyframes pulse { 0%,100%{opacity:1}50%{opacity:.3} }
.btn-logout {
  background: rgba(255,255,255,.1);
  border: 1px solid rgba(255,255,255,.15);
  border-radius: 8px; padding: 6px 12px;
  color: rgba(255,255,255,.7);
  font-size: 12px; cursor: pointer;
}
.panel {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
  background: var(--white);
  border-radius: 24px 24px 0 0;
  padding: 12px 20px 30px;
  max-height: 55vh;
  overflow-y: auto;
}
.panel-handle {
  width: 40px; height: 4px; background: #e5e7eb;
  border-radius: 2px; margin: 0 auto 16px;
}
.panel-state { display: none; }
.panel-state.active { display: block; }
.offline-wrap { text-align: center; padding: 20px 0; }
.offline-icon { font-size: 48px; }
.offline-title { font-size: 18px; font-weight: 800; color: var(--navy); }
.request-card {
  background: linear-gradient(135deg, var(--navy), #253260);
  border-radius: 18px; padding: 18px;
  margin-bottom: 16px;
}
.request-top { display: flex; justify-content: space-between; margin-bottom: 12px; }
.request-label { font-size: 12px; font-weight: 700; color: #e8b85a; }
.new-badge {
  background: #c8973a; color: #1a2340;
  border-radius: 6px; padding: 2px 8px;
  font-size: 11px;
}
.countdown-ring { width: 48px; height: 48px; position: relative; }
.countdown-ring svg { width: 48px; height: 48px; transform: rotate(-90deg); }
.ring-bg { fill: none; stroke: rgba(255,255,255,.1); stroke-width: 3; }
.ring-fill { fill: none; stroke: #c8973a; stroke-width: 3; }
.ring-num {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; color: white;
}
.passenger-row { display: flex; gap: 12px; margin-bottom: 12px; }
.passenger-avatar {
  width: 50px; height: 50px; background: rgba(255,255,255,.1);
  border-radius: 50%; display: flex; align-items: center; justify-content: center;
  font-size: 24px;
}
.passenger-name { font-size: 16px; font-weight: 800; color: white; }
.passenger-phone { font-size: 13px; color: rgba(255,255,255,.6); }
.action-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.btn-accept {
  background: #16a34a; color: white;
  border: none; border-radius: 14px; padding: 14px;
  font-weight: 800; cursor: pointer;
}
.btn-reject {
  border: 2px solid #e5e7eb; background: transparent;
  border-radius: 14px; padding: 14px;
  color: #dc2626; font-weight: 800; cursor: pointer;
}
.active-card {
  background: #f9fafb; border: 1.5px solid #e5e7eb;
  border-radius: 16px; padding: 14px;
  display: flex; gap: 12px; margin-bottom: 14px;
}
.btn-call {
  background: #16a34a; border: none;
  border-radius: 10px; padding: 8px 12px;
  color: white; font-weight: bold; cursor: pointer;
}
.steps-row { display: flex; gap: 6px; margin-bottom: 14px; }
.step-pill {
  flex: 1; padding: 8px; border-radius: 10px;
  text-align: center; font-size: 11px; font-weight: 700;
  background: #f3f4f6; color: #6b7280;
}
.step-pill.active-step { background: #1a2340; color: white; }
.btn-arrived {
  background: #c8973a; color: #1a2340;
  border: none; border-radius: 14px; padding: 14px;
  font-weight: 800; cursor: pointer;
  width: 100%;
}
.btn-finish {
  background: #16a34a; color: white;
  border: none; border-radius: 14px; padding: 14px;
  font-weight: 800; cursor: pointer;
  width: 100%;
}
.locate-btn {
  position: fixed; bottom: 200px; left: 16px; z-index: 200;
  width: 46px; height: 46px;
  background: white; border: none; border-radius: 12px;
  font-size: 20px; cursor: pointer;
}
.toast {
  position: fixed; top: 80px; left: 50%; transform: translateX(-50%);
  background: #1a2340; color: white;
  padding: 10px 20px; border-radius: 999px;
  font-size: 14px; z-index: 999;
  display: none;
}
.toast.show { display: block; }
</style>
</head>
<body>
<div id="map"></div>
<div class="toast" id="toast"></div>
<div class="topbar">
  <div class="topbar-left"><span>🏍️ وصلني <b>كتامية</b></span></div>
  <div style="display:flex;align-items:center;gap:6px">
    <div class="online-toggle" id="online-toggle" onclick="toggleOnline()">
      <div class="toggle-dot"></div>
      <span id="online-label">أوف لاين</span>
    </div>
    <button class="btn-logout" onclick="logout()">خروج</button>
  </div>
</div>
<button class="locate-btn" onclick="centerMap()">📍</button>
<div class="panel">
  <div class="panel-handle"></div>
  <div class="panel-state active" id="state-offline">
    <div class="offline-wrap">
      <div class="offline-icon">🏍️</div>
      <div class="offline-title">أنت أوف لاين</div>
    </div>
  </div>
  <div class="panel-state" id="state-online">
    <div class="offline-wrap">
      <div class="offline-icon">📡</div>
      <div class="offline-title">أنت أون لاين</div>
    </div>
  </div>
  <div class="panel-state" id="state-request">
    <div class="request-card">
      <div class="request-top">
        <div class="request-label">🔔 طلب جديد <span class="new-badge">جديد</span></div>
        <div class="countdown-ring">
          <svg viewBox="0 0 38 38"><circle class="ring-bg" cx="19" cy="19" r="18"/><circle class="ring-fill" id="ring-fill" cx="19" cy="19" r="18"/></svg>
          <div class="ring-num" id="ring-num">30</div>
        </div>
      </div>
      <div class="passenger-row">
        <div class="passenger-avatar">🧑</div>
        <div>
          <div class="passenger-name" id="req-name">—</div>
          <div class="passenger-phone" id="req-phone">—</div>
        </div>
      </div>
      <div class="action-row">
        <button class="btn-accept" onclick="acceptRide()">✓ قبول</button>
        <button class="btn-reject" onclick="rejectRide()">✕ رفض</button>
      </div>
    </div>
  </div>
  <div class="panel-state" id="state-active">
    <div class="active-card">
      <div class="passenger-avatar">🧑</div>
      <div style="flex:1">
        <div class="passenger-name" id="active-name">—</div>
        <div class="passenger-phone" id="active-phone">—</div>
      </div>
      <button class="btn-call" onclick="callPassenger()">📞</button>
    </div>
    <div class="steps-row">
      <div class="step-pill active-step" id="step1">🏍️ رايح للراكب</div>
      <div class="step-pill" id="step2">📍 وصلت</div>
      <div class="step-pill" id="step3">✅ تم التوصيل</div>
    </div>
    <button class="btn-arrived" id="btn-arrived" onclick="markArrived()">📍 وصلت للراكب</button>
    <button class="btn-finish" id="btn-finish" onclick="finishRide()" style="display:none">✅ تم التوصيل</button>
  </div>
</div>
<script src="captain.js"></script>
</body>
</html>
