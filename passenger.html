<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
<title>وصلني كتامية — راكب</title>
<link rel="manifest" href="manifest.json"/>
<meta name="theme-color" content="#1a2340"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css"/>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<style>
:root { --navy: #1a2340; --gold: #c8973a; --green: #16a34a; --white: #fff; --muted: #6b7280; --ff: 'Cairo', sans-serif; }
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: var(--ff); overflow: hidden; height: 100%; }
#map { position: fixed; inset: 0; z-index: 0; }
.topbar {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  background: var(--navy); padding: 12px 16px;
  display: flex; justify-content: space-between;
}
.topbar-logo span { font-size: 20px; font-weight: 900; color: var(--white); }
.topbar-logo span b { color: #e8b85a; }
.btn-logout {
  background: rgba(255,255,255,.1); border: none;
  border-radius: 8px; padding: 6px 12px;
  color: rgba(255,255,255,.7); font-size: 12px; cursor: pointer;
}
.panel {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
  background: var(--white); border-radius: 24px 24px 0 0;
  padding: 12px 20px 30px; max-height: 55vh; overflow-y: auto;
}
.panel-state { display: none; }
.panel-state.active { display: block; }
.search-box {
  display: flex; gap: 8px; background: #f9fafb;
  border: 1.5px solid #e5e7eb; border-radius: 14px;
  padding: 12px 16px; margin-bottom: 12px;
}
.search-box input { flex: 1; border: none; background: transparent; font-family: var(--ff); }
.search-box button { background: var(--navy); border: none; border-radius: 10px; padding: 6px 12px; color: white; cursor: pointer; }
.btn-request {
  width: 100%; background: linear-gradient(135deg, var(--navy), #253260);
  color: white; border: none; border-radius: 16px;
  padding: 16px; font-weight: 900; cursor: pointer;
}
.waiting-anim { text-align: center; padding: 20px; }
.waiting-timer { font-size: 28px; font-weight: 900; color: var(--gold); margin-top: 8px; }
.btn-cancel {
  width: 100%; border: 1.5px solid #e5e7eb; background: transparent;
  border-radius: 14px; padding: 13px; color: #dc2626; font-weight: 700; cursor: pointer;
}
.captain-card {
  background: linear-gradient(135deg, var(--navy), #253260);
  border-radius: 16px; padding: 16px; display: flex; gap: 14px;
}
.captain-avatar {
  width: 52px; height: 52px; background: var(--gold);
  border-radius: 50%; display: flex; align-items: center; justify-content: center;
  font-size: 24px;
}
.captain-name { font-size: 16px; font-weight: 800; color: white; }
.rating-row { display: flex; justify-content: center; gap: 8px; margin: 18px 0; }
.star-btn { font-size: 28px; cursor: pointer; opacity: .4; }
.star-btn.on { opacity: 1; }
.btn-done {
  width: 100%; background: #16a34a; color: white;
  border: none; border-radius: 14px; padding: 15px; font-weight: 800; cursor: pointer;
}
.locate-btn {
  position: fixed; bottom: 200px; left: 16px; z-index: 200;
  width: 46px; height: 46px; background: white;
  border: none; border-radius: 12px; font-size: 20px; cursor: pointer;
}
.toast {
  position: fixed; top: 80px; left: 50%; transform: translateX(-50%);
  background: var(--navy); color: white; padding: 10px 20px;
  border-radius: 999px; z-index: 999; display: none;
}
.toast.show { display: block; }
</style>
</head>
<body>
<div id="map"></div>
<div class="toast" id="toast"></div>
<div class="topbar">
  <div class="topbar-logo"><span>🏍️ وصلني <b>كتامية</b></span></div>
  <button class="btn-logout" onclick="logout()">خروج</button>
</div>
<button class="locate-btn" onclick="centerMap()">📍</button>
<div class="panel">
  <div class="panel-handle"></div>
  <div class="panel-state active" id="state-idle">
    <div class="search-box">
      <input type="text" id="search-input" placeholder="اكتب عنوان الوجهة"/>
      <button onclick="searchLocation()">🔍 بحث</button>
    </div>
    <button class="btn-request" onclick="requestRide()">🏍️ اطلب توصيلة</button>
  </div>
  <div class="panel-state" id="state-waiting">
    <div class="waiting-anim">
      <div>🔍 بندور على كابتن...</div>
      <div class="waiting-timer" id="wait-timer">00:00</div>
    </div>
    <button class="btn-cancel" onclick="cancelRide()">إلغاء الطلب</button>
  </div>
  <div class="panel-state" id="state-accepted">
    <div class="captain-card">
      <div class="captain-avatar">🏍️</div>
      <div><div class="captain-name" id="cap-name">—</div><div id="cap-plate" style="font-size:12px;color:#ccc">—</div></div>
    </div>
    <button class="btn-cancel" onclick="cancelRide()">إلغاء الرحلة</button>
  </div>
  <div class="panel-state" id="state-arrived">
    <div style="text-align:center"><div style="font-size:48px">🎉</div><div class="waiting-timer">وصلت!</div></div>
    <div class="rating-row"><span class="star-btn" onclick="rate(1)">⭐</span><span class="star-btn" onclick="rate(2)">⭐</span><span class="star-btn" onclick="rate(3)">⭐</span><span class="star-btn" onclick="rate(4)">⭐</span><span class="star-btn" onclick="rate(5)">⭐</span></div>
    <button class="btn-done" onclick="doneRide()">تمام</button>
  </div>
</div>
<script src="passenger.js"></script>
</body>
</html>
