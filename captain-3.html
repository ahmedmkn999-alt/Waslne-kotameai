<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>وصلني كتامية — كابتن</title>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<link rel="manifest" href="manifest.json"/>
<meta name="theme-color" content="#1a2340"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
:root {
  --navy:  #1a2340;
  --gold:  #c8973a;
  --gold2: #e8b85a;
  --green: #16a34a;
  --red:   #dc2626;
  --white: #ffffff;
  --muted: #6b7280;
  --ff:    'Cairo', sans-serif;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; font-family: var(--ff); overflow: hidden; }

#map { position: fixed; inset: 0; z-index: 0; }

/* ── TOP BAR ── */
.topbar {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  background: var(--navy);
  padding: 12px 16px;
  display: flex; align-items: center; justify-content: space-between;
  box-shadow: 0 2px 20px rgba(0,0,0,.3);
}
.topbar-left { display: flex; align-items: center; gap: 10px; }
.topbar-left span { font-size: 18px; font-weight: 900; color: var(--white); }
.topbar-left span b { color: var(--gold2); }

/* Online toggle */
.online-toggle {
  display: flex; align-items: center; gap: 8px;
  background: rgba(255,255,255,.08);
  border: 1px solid rgba(255,255,255,.12);
  border-radius: 999px; padding: 6px 14px;
  cursor: pointer; transition: all .2s;
}
.online-toggle.on  { background: rgba(22,163,74,.2);  border-color: rgba(22,163,74,.4); }
.online-toggle span { font-size: 12px; font-weight: 700; color: rgba(255,255,255,.7); }
.online-toggle.on span { color: #4ade80; }
.toggle-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--muted); transition: background .2s;
}
.online-toggle.on .toggle-dot { background: #4ade80; animation: livePulse 1.5s infinite; }
@keyframes livePulse { 0%,100%{opacity:1}50%{opacity:.3} }

.btn-logout {
  background: rgba(255,255,255,.1); border: 1px solid rgba(255,255,255,.15);
  border-radius: 8px; padding: 6px 12px;
  color: rgba(255,255,255,.7); font-family: var(--ff);
  font-size: 12px; cursor: pointer; transition: all .2s;
}
.btn-logout:hover { background: rgba(255,255,255,.2); color: var(--white); }

/* ── BOTTOM PANEL ── */
.panel {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
  background: var(--white);
  border-radius: 24px 24px 0 0;
  padding: 12px 20px 30px;
  box-shadow: 0 -8px 40px rgba(0,0,0,.2);
}
.panel-handle {
  width: 40px; height: 4px; background: #e5e7eb;
  border-radius: 2px; margin: 0 auto 16px;
}

.panel-state { display: none; }
.panel-state.active { display: block; animation: fadeUp .35s ease; }
@keyframes fadeUp {
  from { opacity:0; transform:translateY(10px); }
  to   { opacity:1; transform:translateY(0); }
}

/* ── OFFLINE ── */
.offline-wrap { text-align: center; padding: 10px 0 6px; }
.offline-icon { font-size: 44px; margin-bottom: 10px; opacity: .4; }
.offline-title { font-size: 17px; font-weight: 800; color: var(--navy); }
.offline-sub   { font-size: 13px; color: var(--muted); margin-top: 4px; }

/* ── WAITING (online, no ride) ── */
.online-wrap { text-align: center; padding: 8px 0; }
.radar {
  width: 70px; height: 70px; position: relative;
  margin: 0 auto 12px;
  display: flex; align-items: center; justify-content: center;
}
.radar::before, .radar::after {
  content: ''; position: absolute; inset: 0;
  border: 2px solid var(--navy); border-radius: 50%;
  animation: radarPulse 2s ease-out infinite;
}
.radar::after { animation-delay: -1s; }
@keyframes radarPulse {
  from { transform: scale(.5); opacity: .8; }
  to   { transform: scale(1.6); opacity: 0; }
}
.radar-icon { font-size: 30px; position: relative; z-index:1; }
.online-title { font-size: 17px; font-weight: 800; color: var(--navy); }
.online-sub   { font-size: 13px; color: var(--muted); margin-top: 4px; }

/* ── NEW RIDE REQUEST ── */
.request-card {
  background: linear-gradient(135deg, var(--navy), #253260);
  border-radius: 18px; padding: 18px;
  margin-bottom: 16px; position: relative; overflow: hidden;
}
.request-card::before {
  content: '';
  position: absolute; top: -30px; left: -30px;
  width: 120px; height: 120px;
  background: rgba(200,151,58,.1); border-radius: 50%;
}
.request-top {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 12px;
}
.request-label {
  font-size: 12px; font-weight: 700; color: var(--gold2);
  letter-spacing: .5px; text-transform: uppercase;
  display: flex; align-items: center; gap: 6px;
}
.new-badge {
  background: var(--gold); color: var(--navy);
  border-radius: 6px; padding: 2px 8px;
  font-size: 11px; font-weight: 900;
  animation: newBadge .6s ease infinite alternate;
}
@keyframes newBadge { from{opacity:1} to{opacity:.5} }

.countdown-ring {
  width: 44px; height: 44px; position: relative; flex-shrink: 0;
}
.countdown-ring svg { transform: rotate(-90deg); }
.ring-bg   { fill: none; stroke: rgba(255,255,255,.1); stroke-width: 3; }
.ring-fill {
  fill: none; stroke: var(--gold); stroke-width: 3;
  stroke-linecap: round;
  stroke-dasharray: 113;
  stroke-dashoffset: 0;
  transition: stroke-dashoffset 1s linear;
}
.ring-num {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; font-weight: 900; color: var(--white);
}

.passenger-row {
  display: flex; align-items: center; gap: 12px;
}
.passenger-avatar {
  width: 46px; height: 46px; background: rgba(255,255,255,.1);
  border-radius: 50%; display: flex; align-items: center; justify-content: center;
  font-size: 22px; flex-shrink: 0;
}
.passenger-name  { font-size: 16px; font-weight: 800; color: var(--white); }
.passenger-phone { font-size: 12px; color: rgba(255,255,255,.5); margin-top: 2px; }
.passenger-dist  { font-size: 12px; color: var(--gold2); margin-top: 4px; font-weight: 600; }

/* Accept / Reject */
.action-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

.btn-accept {
  border: none; border-radius: 14px; padding: 15px;
  font-family: var(--ff); font-size: 15px; font-weight: 800; cursor: pointer;
  background: linear-gradient(135deg, var(--green), #15803d);
  color: var(--white);
  box-shadow: 0 6px 20px rgba(22,163,74,.35);
  transition: all .2s;
  display: flex; align-items: center; justify-content: center; gap: 8px;
}
.btn-accept:hover { transform: translateY(-2px); box-shadow: 0 10px 28px rgba(22,163,74,.5); }
.btn-accept:active { transform: scale(.97); }

.btn-reject {
  border: 2px solid #e5e7eb; border-radius: 14px; padding: 15px;
  font-family: var(--ff); font-size: 15px; font-weight: 800; cursor: pointer;
  background: transparent; color: var(--red);
  transition: all .2s;
  display: flex; align-items: center; justify-content: center; gap: 8px;
}
.btn-reject:hover { border-color: var(--red); background: #fef2f2; transform: translateY(-2px); }
.btn-reject:active { transform: scale(.97); }

/* ── ACTIVE RIDE ── */
.active-card {
  background: #f9fafb; border: 1.5px solid #e5e7eb;
  border-radius: 16px; padding: 14px 16px;
  display: flex; align-items: center; gap: 12px;
  margin-bottom: 14px;
}
.active-avatar {
  width: 44px; height: 44px; background: var(--navy);
  border-radius: 50%; display: flex; align-items: center; justify-content: center;
  font-size: 20px; flex-shrink: 0;
}
.active-name  { font-size: 15px; font-weight: 800; color: var(--navy); }
.active-phone { font-size: 12px; color: var(--muted); margin-top: 2px; }

.steps-row {
  display: flex; align-items: center; gap: 6px;
  margin-bottom: 14px;
}
.step-pill {
  flex: 1; padding: 8px 6px; border-radius: 10px;
  text-align: center; font-size: 11px; font-weight: 700;
  background: #f3f4f6; color: var(--muted);
  transition: all .3s;
}
.step-pill.done  { background: rgba(22,163,74,.1); color: var(--green); }
.step-pill.active-step { background: var(--navy); color: var(--white); }
.step-arrow { color: #d1d5db; font-size: 12px; }

.btn-arrived, .btn-finish {
  width: 100%; border: none; border-radius: 14px; padding: 15px;
  font-family: var(--ff); font-size: 16px; font-weight: 800; cursor: pointer;
  transition: all .2s; margin-bottom: 8px;
}
.btn-arrived {
  background: linear-gradient(135deg, var(--gold), var(--gold2));
  color: var(--navy);
  box-shadow: 0 6px 20px rgba(200,151,58,.35);
}
.btn-arrived:hover { transform: translateY(-2px); }

.btn-finish {
  background: linear-gradient(135deg, var(--green), #15803d);
  color: var(--white);
  box-shadow: 0 6px 20px rgba(22,163,74,.3);
}
.btn-finish:hover { transform: translateY(-2px); }

/* ── Locate btn ── */
.locate-btn {
  position: fixed; bottom: 220px; left: 16px; z-index: 200;
  width: 46px; height: 46px;
  background: var(--white); border: none; border-radius: 12px;
  font-size: 20px; cursor: pointer;
  box-shadow: 0 4px 16px rgba(0,0,0,.2);
  display: flex; align-items: center; justify-content: center;
  transition: all .2s;
}
.locate-btn:hover { transform: scale(1.08); }

/* ── Toast ── */
.toast {
  position: fixed; top: 80px; left: 50%; transform: translateX(-50%);
  background: var(--navy); color: var(--white);
  padding: 10px 20px; border-radius: 999px;
  font-size: 14px; font-weight: 700;
  z-index: 999; white-space: nowrap;
  box-shadow: 0 4px 20px rgba(0,0,0,.3);
  animation: toastIn .3s ease;
  display: none;
}
.toast.show { display: block; }
@keyframes toastIn { from{opacity:0;transform:translateX(-50%) translateY(-10px)} to{opacity:1;transform:translateX(-50%) translateY(0)} }
</style>
</head>
<body>

<div id="map"></div>
<div class="toast" id="toast"></div>

<!-- Top bar -->
<div class="topbar">
  <div class="topbar-left">
    <span>🏍️ وصلني <b>كتامية</b></span>
  </div>
  <div style="display:flex;align-items:center;gap:6px">
    <div id="cap-stats" style="font-size:11px;color:rgba(255,255,255,.6);text-align:center"></div>
    <div class="online-toggle" id="online-toggle" onclick="toggleOnline()">
      <div class="toggle-dot"></div>
      <span id="online-label">أوف لاين</span>
    </div>
    <button class="btn-logout" onclick="logout()">خروج</button>
  </div>
</div>

<button class="locate-btn" onclick="centerMap()">📍</button>

<!-- Panel -->
<div class="panel">
  <div class="panel-handle"></div>

  <!-- OFFLINE -->
  <div class="panel-state active" id="state-offline">
    <div class="offline-wrap">
      <div class="offline-icon">🏍️</div>
      <div class="offline-title">أنت أوف لاين</div>
      <div class="offline-sub">اضغط "أوف لاين" فوق عشان تبدأ تستقبل طلبات</div>
    </div>
  </div>

  <!-- ONLINE / WAITING -->
  <div class="panel-state" id="state-online">
    <div class="online-wrap">
      <div class="radar"><span class="radar-icon">📡</span></div>
      <div class="online-title">أنت أون لاين</div>
      <div class="online-sub">بتستنى طلبات جديدة…</div>
    </div>
  </div>

  <!-- NEW REQUEST -->
  <div class="panel-state" id="state-request">
    <div class="request-card">
      <div class="request-top">
        <div class="request-label">
          🔔 طلب جديد
          <span class="new-badge">جديد</span>
        </div>
        <div class="countdown-ring">
          <svg viewBox="0 0 38 38" width="44" height="44">
            <circle class="ring-bg" cx="19" cy="19" r="18"/>
            <circle class="ring-fill" id="ring-fill" cx="19" cy="19" r="18"/>
          </svg>
          <div class="ring-num" id="ring-num">30</div>
        </div>
      </div>
      <div class="passenger-row">
        <div class="passenger-avatar">🧑</div>
        <div>
          <div class="passenger-name"  id="req-name">—</div>
          <div class="passenger-phone" id="req-phone">—</div>
          <div class="passenger-dist"  id="req-dist">📍 جاري الحساب…</div>
          <div id="req-dest" style="font-size:12px;color:rgba(255,255,255,.7);margin-top:4px"></div>
          <div id="req-price" style="font-size:14px;font-weight:900;color:#e8b85a;margin-top:4px"></div>
        </div>
      </div>
    </div>
    <div class="action-row">
      <button class="btn-accept" onclick="acceptRide()">✓ قبول</button>
      <button class="btn-reject" onclick="rejectRide()">✕ رفض</button>
    </div>
  </div>

  <!-- ACTIVE RIDE -->
  <div class="panel-state" id="state-active">
    <div class="active-card">
      <div class="active-avatar">🧑</div>
      <div style="flex:1;min-width:0">
        <div class="active-name"  id="active-name">—</div>
        <div class="active-phone" id="active-phone">—</div>
      </div>
      <!-- CALL PASSENGER -->
      <a class="cap-call-btn" id="pas-call-btn" href="#" style="display:flex;align-items:center;justify-content:center;width:42px;height:42px;border-radius:50%;background:#16a34a;font-size:20px;text-decoration:none;box-shadow:0 3px 12px rgba(22,163,74,.4);flex-shrink:0">📞</a>
    </div>

    <div class="steps-row" id="steps-row">
      <div class="step-pill active-step" id="step1">🏍️ رايح للراكب</div>
      <div class="step-arrow">←</div>
      <div class="step-pill" id="step2">📍 وصلت</div>
      <div class="step-arrow">←</div>
      <div class="step-pill" id="step3">✅ تم التوصيل</div>
    </div>

    <button class="btn-arrived" id="btn-arrived" onclick="markArrived()">📍 وصلت للراكب</button>
    <button class="btn-finish"  id="btn-finish"  onclick="finishRide()" style="display:none">✅ تم التوصيل</button>
  </div>

</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="security.js"></script>

<script>
'use strict';
/* ── Auth guard ── */
const session = Security.checkSession();
if (!session || session.role !== 'captain') window.location.href = 'index.html';
const uid   = session.uid;
const uname = session.name || '';
const uphone= session.phone|| '';

/* ── Firebase ── */
const firebaseConfig = {
  apiKey: "AIzaSyCQqqiNQkm-NPGR5XVYkJaM8Li8nqnZYA8",
  authDomain: "al-warsha.firebaseapp.com",
  databaseURL: "https://al-warsha-default-rtdb.firebaseio.com",
  projectId: "al-warsha",
  storageBucket: "al-warsha.firebasestorage.app",
  messagingSenderId: "913946656614",
  appId: "1:913946656614:web:4df914457d79b75dee2bf5"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

/* ── Map ── */
let myLat = 30.0, myLng = 31.4;
const map = L.map('map', { zoomControl:false, attributionControl:false }).setView([myLat, myLng], 16);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom:19 }).addTo(map);

function makeIcon(emoji, size=36) {
  return L.divIcon({
    html: `<div style="font-size:${size}px;line-height:1;filter:drop-shadow(0 2px 4px rgba(0,0,0,.4))">${emoji}</div>`,
    iconSize:[size,size], iconAnchor:[size/2,size/2], className:''
  });
}

let myMarker = null, pasMarker = null;

function setMyMarker(lat,lng) {
  if (myMarker) myMarker.setLatLng([lat,lng]);
  else myMarker = L.marker([lat,lng],{icon:makeIcon('🏍️',40)}).addTo(map);
}
function centerMap() { map.setView([myLat,myLng],16); }

/* ── GPS ── */
function startGPS() {
  if (!navigator.geolocation) return;
  navigator.geolocation.watchPosition(pos => {
    myLat = pos.coords.latitude;
    myLng = pos.coords.longitude;
    setMyMarker(myLat, myLng);
    // Update Firestore location
    db.collection('users').doc(uid).update({
      location: { lat: myLat, lng: myLng }
    }).catch(()=>{});
    // Update ride if active
    if (currentRideId) {
      db.collection('rides').doc(currentRideId).update({
        captainLocation: { lat: myLat, lng: myLng }
      }).catch(()=>{});
    }
  }, null, { enableHighAccuracy:true, maximumAge:5000 });
}
startGPS();

/* ── State ── */
let isOnline     = false;
let currentRideId = null;
let pendingListener = null;
let countdownTimer  = null;
let countdownSecs   = 30;
let rideListener    = null;
let arrivedStep     = false;

function showState(id) {
  document.querySelectorAll('.panel-state').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

/* ── Online toggle ── */
async function toggleOnline() {
  isOnline = !isOnline;
  const tog   = document.getElementById('online-toggle');
  const label = document.getElementById('online-label');
  tog.classList.toggle('on', isOnline);
  label.textContent = isOnline ? 'أون لاين' : 'أوف لاين';

  await db.collection('users').doc(uid).update({ isOnline }).catch(()=>{});

  if (isOnline) {
    showState('state-online');
    listenForRides();
    showToast('أنت أون لاين الآن 🟢');
  } else {
    stopListening();
    showState('state-offline');
    showToast('أنت أوف لاين 🔴');
  }
}

/* ── Listen for pending rides ── */
function listenForRides() {
  if (pendingListener) return;
  pendingListener = db.collection('rides')
    .where('status','==','pending')
    .onSnapshot(snap => {
      if (!isOnline || currentRideId) return;
      snap.docChanges().forEach(change => {
        if (change.type === 'added') {
          const data = change.doc.data();
          const id   = change.doc.id;
          showRideRequest(id, data);
        }
      });
    });
}

function stopListening() {
  if (pendingListener) { pendingListener(); pendingListener = null; }
  clearInterval(countdownTimer);
}

/* ── Show ride request ── */
function showRideRequest(rideId, data) {
  currentRideId = rideId;
  document.getElementById('req-name').textContent  = data.passengerName  || '—';
  document.getElementById('req-phone').textContent = data.passengerPhone || '—';
  document.getElementById('req-dest').textContent  = data.destName ? `🎯 ${data.destName}` : '';
  document.getElementById('req-price').textContent = data.price ? `💰 ${data.price} جنيه` : '';

  // Distance
  if (data.passengerLocation) {
    const dist = calcDist(myLat, myLng, data.passengerLocation.lat, data.passengerLocation.lng);
    document.getElementById('req-dist').textContent = `📍 ${dist} كم منك`;
    if (pasMarker) pasMarker.setLatLng([data.passengerLocation.lat, data.passengerLocation.lng]);
    else pasMarker = L.marker([data.passengerLocation.lat, data.passengerLocation.lng],
      { icon: makeIcon('📍',36) }).addTo(map);
    // Show dest on map too
    if (data.destLocation) {
      L.marker([data.destLocation.lat, data.destLocation.lng],
        { icon: makeIcon('🎯',36) }).addTo(map)
        .bindPopup(`<b>${data.destName||'الوجهة'}</b>`).openPopup();
    }
    map.fitBounds([[myLat,myLng],[data.passengerLocation.lat,data.passengerLocation.lng]],{padding:[60,60]});
  }

  showState('state-request');
  startCountdown();
}

/* ── Countdown ── */
function startCountdown() {
  clearInterval(countdownTimer);
  countdownSecs = 30;
  const fill = document.getElementById('ring-fill');
  const num  = document.getElementById('ring-num');
  const circ = 113;

  countdownTimer = setInterval(() => {
    countdownSecs--;
    num.textContent = countdownSecs;
    fill.style.strokeDashoffset = circ - (circ * countdownSecs / 30);
    if (countdownSecs <= 0) {
      clearInterval(countdownTimer);
      rejectRide();
    }
  }, 1000);
}

/* ── Accept ── */
async function acceptRide() {
  clearInterval(countdownTimer);
  if (!currentRideId) return;

  const snap = await db.collection('rides').doc(currentRideId).get();
  if (!snap.exists || snap.data().status !== 'pending') {
    showToast('الطلب اتلغى قبل ما تقبل');
    currentRideId = null;
    showState('state-online');
    return;
  }

  const capData = await db.collection('users').doc(uid).get();
  const capInfo = capData.data() || {};

  await db.collection('rides').doc(currentRideId).update({
    status:          'accepted',
    captainId:       uid,
    captainName:     Security.sanitize(uname),
    captainPlate:    Security.sanitize(capInfo.plate || '—'),
    captainPhone:    capInfo.phone || '',
    captainAvgRating: capInfo.avgRating || null,
    captainLocation: { lat: myLat, lng: myLng },
    acceptedAt:      firebase.firestore.FieldValue.serverTimestamp()
  });

  const rideData = snap.data();
  document.getElementById('active-name').textContent  = Security.sanitize(rideData.passengerName  || '—');
  document.getElementById('active-phone').textContent = Security.maskPhone(rideData.passengerPhone || '');

  // Call button
  if(rideData.passengerPhone){
    const btn=document.getElementById('pas-call-btn');
    btn.href=`tel:${rideData.passengerPhone}`;
    btn.title=`اتصل بـ ${Security.maskPhone(rideData.passengerPhone)}`;
  }
  arrivedStep = false;
  document.getElementById('btn-arrived').style.display = '';
  document.getElementById('btn-finish').style.display  = 'none';
  document.getElementById('step1').className = 'step-pill active-step';
  document.getElementById('step2').className = 'step-pill';
  document.getElementById('step3').className = 'step-pill';
  showState('state-active');
  showToast('قبلت الطلب ✅');

  // Listen for cancellation
  rideListener = db.collection('rides').doc(currentRideId).onSnapshot(snap => {
    const d = snap.data();
    if (d && d.status === 'cancelled') {
      cleanupRide();
      showState('state-online');
      showToast('الراكب ألغى الطلب ❌');
    }
  });
}

/* ── Reject ── */
async function rejectRide() {
  clearInterval(countdownTimer);
  if (pasMarker) { pasMarker.remove(); pasMarker = null; }
  currentRideId = null;
  showState('state-online');
}

/* ── Arrived at passenger ── */
async function markArrived() {
  if (!currentRideId) return;
  await db.collection('rides').doc(currentRideId).update({ status: 'ongoing' });
  arrivedStep = true;
  document.getElementById('step1').className = 'step-pill done';
  document.getElementById('step2').className = 'step-pill active-step';
  document.getElementById('btn-arrived').style.display = 'none';
  document.getElementById('btn-finish').style.display  = '';
  showToast('تم التحديث — رايح للوجهة 🏍️');
}

/* ── Finish ride ── */
async function finishRide() {
  if (!currentRideId) return;
  await db.collection('rides').doc(currentRideId).update({
    status:   'done',
    finishedAt: firebase.firestore.FieldValue.serverTimestamp()
  });
  document.getElementById('step2').className = 'step-pill done';
  document.getElementById('step3').className = 'step-pill active-step';
  showToast('تمت الرحلة بنجاح 🎉');
  cleanupRide();
  setTimeout(() => showState('state-online'), 1500);
}

function cleanupRide() {
  if (rideListener) { rideListener(); rideListener = null; }
  if (pasMarker)    { pasMarker.remove(); pasMarker = null; }
  currentRideId = null;
}

/* ── Distance ── */
function calcDist(lat1,lng1,lat2,lng2) {
  const R = 6371;
  const dLat = (lat2-lat1) * Math.PI/180;
  const dLng = (lng2-lng1) * Math.PI/180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
  return (R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a))).toFixed(1);
}

/* ── Toast ── */
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

/* ── Logout ── */
async function logout() {
  await db.collection('users').doc(uid).update({ isOnline: false }).catch(()=>{});
  localStorage.clear();
  window.location.href = 'index.html';
}

/* ── Captain Stats ── */
async function loadCaptainStats() {
  try {
    const capSnap = await db.collection('users').doc(uid).get();
    const capData = capSnap.data() || {};
    const avg = capData.avgRating ? capData.avgRating.toFixed(1) : '—';
    const stars = capData.avgRating ? '★'.repeat(Math.round(capData.avgRating)) : '';
    // Count today's rides
    const today = new Date(); today.setHours(0,0,0,0);
    const ridesSnap = await db.collection('rides')
      .where('captainId','==',uid)
      .where('status','==','done')
      .get();
    let todayCount = 0;
    ridesSnap.forEach(doc => {
      const d = doc.data();
      if (d.createdAt && d.createdAt.toDate() >= today) todayCount++;
    });
    document.getElementById('cap-stats').innerHTML =
      `${stars} ${avg} ⭐<br>${todayCount} مشوار اليوم`;
  } catch(e) {}
}

window.addEventListener('DOMContentLoaded', () => {
  loadCaptainStats();
});
</script>
