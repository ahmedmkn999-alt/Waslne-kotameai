<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>وصلني كتامية - تسجيل الدخول</title>
    
    <!-- تجهيز التطبيق للتثبيت PWA Apple/Android -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="وصلني كتامية">
    <link rel="apple-touch-icon" href="https://i.postimg.cc/26b20yRx/Gemini-Generated-Image-2al0sf2al0sf2al0.png">
    
    <!-- خطوط جوجل -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <!-- أيقونات الخط الرائع -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary-color: #1d3557;
            --secondary-color: #b79455;
            --bg-color: #f4f6f9;
            --card-bg: #ffffff;
            --text-color: #333333;
            --error-color: #e63946;
            --success-color: #2a9d8f;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Cairo', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            background: linear-gradient(135deg, #1d3557 0%, #0f1b2d 100%);
        }

        .login-container {
            background-color: var(--card-bg);
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 420px;
            padding: 40px 30px;
            text-align: center;
            position: relative;
            overflow: hidden;
            border: 2px solid var(--secondary-color);
        }

        /* تعديل وقص الصورة لتصبح دائرية تماماً وفي المنتصف */
        .logo-wrapper {
            width: 150px;
            height: 150px;
            margin: 0 auto 25px auto;
            border-radius: 50%;
            border: 4px solid var(--secondary-color);
            overflow: hidden;
            box-shadow: 0 8px 16px rgba(0,0,0,0.15);
            background-color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        h2 {
            color: var(--primary-color);
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .subtitle {
            color: #666;
            font-size: 14px;
            margin-bottom: 30px;
        }

        .input-group {
            position: relative;
            margin-bottom: 20px;
            text-align: right;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--primary-color);
            font-weight: 600;
            font-size: 14px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper i {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #888;
            transition: color 0.3s;
        }

        .input-wrapper input {
            width: 100%;
            padding: 12px 45px 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            outline: none;
            font-size: 15px;
            transition: all 0.3s;
            text-align: right;
        }

        .input-wrapper input:focus {
            border-color: var(--secondary-color);
            box-shadow: 0 0 8px rgba(183, 148, 85, 0.2);
        }

        .input-wrapper input:focus + i {
            color: var(--secondary-color);
        }

        /* زر إظهار وإخفاء كلمة المرور */
        .toggle-password {
            position: absolute;
            left: 15px;
            right: auto !important;
            cursor: pointer;
        }

        .options-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            font-size: 13px;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 5px;
            cursor: pointer;
            color: #555;
        }

        .forgot-pass {
            color: var(--secondary-color);
            text-decoration: none;
            font-weight: 600;
        }

        .forgot-pass:hover {
            text-decoration: underline;
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--primary-color) 0%, #2b4c7e 100%);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 5px 15px rgba(29, 53, 87, 0.3);
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 7px 20px rgba(29, 53, 87, 0.4);
            background: linear-gradient(135deg, #2b4c7e 0%, var(--primary-color) 100%);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        /* رسائل الخطأ والنجاح المتطورة */
        .alert-message {
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
            align-items: center;
            gap: 10px;
            animation: fadeIn 0.4s ease-in-out;
        }

        .alert-error {
            background-color: #ffe3e5;
            color: var(--error-color);
            border: 1px solid #ffa3a8;
        }

        .alert-success {
            background-color: #e8f5e9;
            color: var(--success-color);
            border: 1px solid #a7ffd0;
        }

        .footer-text {
            margin-top: 25px;
            font-size: 14px;
            color: #666;
        }

        .footer-text a {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 700;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* تأثيرات التحميل عند الضغط على زر الدخول */
        .spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="login-container">
        <!-- قص وتدوير لوجو وصلني كتامية المرفق في كل مكان بالتطبيق -->
        <div class="logo-wrapper">
            <img src="https://i.postimg.cc/26b20yRx/Gemini-Generated-Image-2al0sf2al0sf2al0.png" alt="وصلني كتامية">
        </div>

        <h2>وصلني كتامية</h2>
        <div class="subtitle">توصيل موتوسيكل سريع وآمن</div>

        <!-- نظام الإشعارات الداخلي لمعالجة مشاكل عدم الدخول -->
        <div id="alertBox" class="alert-message">
            <i id="alertIcon" class="fa-solid"></i>
            <span id="alertText"></span>
        </div>

        <form id="loginForm" onsubmit="handleLogin(event)">
            <!-- حقل الهاتف أو اسم المستخدم -->
            <div class="input-group">
                <label for="username">رقم الهاتف أو اسم المستخدم</label>
                <div class="input-wrapper">
                    <input type="text" id="username" placeholder="أدخل رقم الهاتف أو اسم المستخدم" required>
                    <i class="fa-solid fa-user"></i>
                </div>
            </div>

            <!-- حقل كلمة المرور -->
            <div class="input-group">
                <label for="password">كلمة المرور</label>
                <div class="input-wrapper">
                    <input type="password" id="password" placeholder="أدخل كلمة المرور" required>
                    <i class="fa-solid fa-lock"></i>
                    <i class="fa-solid fa-eye toggle-password" onclick="togglePasswordVisibility()"></i>
                </div>
            </div>

            <!-- خيارات التذكر ونسيان كلمة المرور -->
            <div class="options-row">
                <label class="remember-me">
                    <input type="checkbox" id="rememberMe">
                    <span>تذكرني دائمًا</span>
                </label>
                <a href="#" class="forgot-pass" onclick="handleForgot(event)">نسيت كلمة المرور؟</a>
            </div>

            <!-- زر الدخول بعد الإصلاح ومقاومة التعليق -->
            <button type="submit" class="login-btn" id="submitBtn">
                <span id="btnText">تسجيل الدخول</span>
                <div class="spinner" id="btnSpinner"></div>
            </button>
        </form>

        <div class="footer-text">
            ليس لديك حساب؟ <a href="#" onclick="handleRegister(event)">أنشئ حساباً جديداً الآن</a>
        </div>
    </div>

    <script>
        // دالة إظهار وإخفاء كلمة المرور بكل سلاسة
        function togglePasswordVisibility() {
            const passwordInput = document.getElementById('password');
            const toggleIcon = document.querySelector('.toggle-password');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                toggleIcon.classList.remove('fa-eye');
                toggleIcon.classList.add('fa-eye-slash');
            } else {
                passwordInput.type = 'password';
                toggleIcon.classList.remove('fa-eye-slash');
                toggleIcon.classList.add('fa-eye');
            }
        }

        // معالجة وإصلاح كود الإرسال ومنع الـ "غيب" والتعليق
        function handleLogin(event) {
            event.preventDefault(); // منع إعادة تحميل الصفحة العشوائي الذي كان يعطل الدخول
            
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();
            const alertBox = document.getElementById('alertBox');
            const alertIcon = document.getElementById('alertIcon');
            const alertText = document.getElementById('alertText');
            const submitBtn = document.getElementById('submitBtn');
            const btnText = document.getElementById('btnText');
            const btnSpinner = document.getElementById('btnSpinner');

            // إخفاء أي تنبيهات قديمة
            alertBox.style.display = 'none';

            // تفعيل حالة التحميل البصري لمنع الضغط المتكرر
            btnText.style.display = 'none';
            btnSpinner.style.display = 'block';
            submitBtn.disabled = true;

            // محاكاة الاتصال والتحقق الآمن (يمكنك ربطها بالـ API الخاص بك هنا)
            setTimeout(() => {
                if (username === "" || password === "") {
                    // إظهار خطأ في حالة الحقول الفارغة
                    alertBox.className = "alert-message alert-error";
                    alertIcon.className = "fa-solid fa-circle-exclamation";
                    alertText.innerText = "يرجى ملء جميع الحقول المطلوبة!";
                    alertBox.style.display = 'flex';
                    
                    // إعادة تعيين الزر
                    btnText.style.display = 'block';
                    btnSpinner.style.display = 'none';
                    submitBtn.disabled = false;
                } else {
                    // نجاح عملية تسجيل الدخول وتخزين بيانات المستخدم لمنع العطل
                    alertBox.className = "alert-message alert-success";
                    alertIcon.className = "fa-solid fa-circle-check";
                    alertText.innerText = "تم تسجيل الدخول بنجاح! جاري الانتقال...";
                    alertBox.style.display = 'flex';

                    // حفظ الجلسة محلياً لضمان عدم الخروج المفاجئ
                    localStorage.setItem('user_logged', username);

                    setTimeout(() => {
                        // هنا تضع رابط صفحة التوجيه الرئيسية للتطبيق بعد تسجيل الدخول بنجاح
                        alert("مرحباً بك في تطبيق وصلني كتامية! تم تسجيل دخولك بنجاح.");
                        btnText.style.display = 'block';
                        btnSpinner.style.display = 'none';
                        submitBtn.disabled = false;
                    }, 1000);
                }
            }, 1200); // تأخير بسيط لمحاكاة استجابة الخادم الحقيقية
        }

        // معالجة الروابط الأخرى بالتطبيق لحمايتها من الأعطال
        function handleForgot(event) {
            event.preventDefault();
            alert("سيتم إرسال كود إعادة تعيين كلمة المرور إلى رقم هاتفك المسجل.");
        }

        function handleRegister(event) {
            event.preventDefault();
            alert("جاري تحويلك لصفحة إنشاء حساب مندوب أو عميل جديد في وصلني كتامية.");
        }

        // كود برمجي تلقائي لجعل التطبيق يظهر بأيقونة دائرية عند تثبيته على الشاشات الرئيسية للهواتف
        window.addEventListener('blur', () => {
            document.title = "عد لوصلني كتامية 🏍️";
        });
        window.addEventListener('focus', () => {
            document.title = "وصلني كتامية - تسجيل الدخول";
        });
    </script>
</body>
</html>
